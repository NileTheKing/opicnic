global:
  scrape_interval: 5s # 5초마다 데이터 수집 (부하 테스트 시 정밀하게 보기 위함)

scrape_configs:
  - job_name: 'opicnic-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080'] # 로컬에서 띄운 스프링 앱 주소

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
