spring:
  threads:
    virtual:
      enabled: true
  application:
    name: opicnic

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

  datasource:
    url: jdbc:mysql://localhost:3306/opicnic
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50 # 10에서 50으로 확장하여 극심한 병목 해결
      connection-timeout: 30000 # 30 seconds
      idle-timeout: 600000 # 10 minutes
      max-lifetime: 1800000 # 30 minutes

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

  ai:
    gemini:
      enabled: ${AI_GEMINI_ENABLED:true} # 통합 설정을 위해 환경변수/프로퍼티 지원
    stt:
      base-url: ${STT_SERVER_URL:http://localhost:8000}
      enabled: ${STT_ENABLED:true} # 추가됨: 테스트 시 false로 설정 가능
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        enabled: ${AI_GEMINI_ENABLED:true} # 이 설정이 GeminiService에서 사용됨
        chat:
          options:
            model: gemini-2.0-flash-lite
  mvc:
    async:
      request-timeout: 120000 # 비동기 타임아웃 120초
  servlet:
    multipart:
      enabled: true # 다시 활성화
      file-size-threshold: 2MB # 2MB 이하는 디스크에 쓰지 않고 메모리에서 처리 (핵심 최적화!)
      max-file-size: 150MB
      max-request-size: 150MB

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: 6c7274effddb5ca04eefc044be19bdec
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/login/oauth2/code/kakao
            scope: profile_nickname,profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

async:
  thread:
    pool-size: 10

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
logging:
  level:
    com.zaxxer.hikari: INFO
    org.hibernate.SQL: INFO

