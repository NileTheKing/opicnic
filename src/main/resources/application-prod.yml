server:
  forward-headers-strategy: framework

spring:
  thymeleaf:
    cache: true

  datasource:
    url: jdbc:mysql://opicnic_mysql:3306/opicnic?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  security:
    oauth2:
      client:
        registration:
          kakao:
            redirect-uri: https://${DOMAIN}/login/oauth2/code/kakao
