<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기록 - Opicnic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="flex min-h-screen">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 p-5 md:p-8 pb-24 md:pb-8 min-w-0">

        <!-- 헤더 -->
        <div class="mb-6">
            <h1 class="text-xl font-bold text-gray-900">기록</h1>
            <p class="text-sm text-gray-500 mt-0.5"
               th:text="${totalCount > 0 ? '총 ' + totalCount + '문항 연습 완료' : '아직 연습 기록이 없어요'}">
            </p>
        </div>

        <!-- 빈 상태 -->
        <div th:if="${totalCount == 0}" class="bg-white rounded-2xl p-10 text-center text-gray-400">
            <i class="fa-solid fa-chart-bar text-4xl mb-4 text-gray-200"></i>
            <p class="font-medium text-gray-500">아직 연습 기록이 없어요</p>
            <p class="text-sm mt-1">첫 연습을 완료하면 분석 결과가 여기에 나타납니다</p>
            <a href="/" class="inline-block mt-5 px-5 py-2.5 bg-indigo-600 text-white text-sm font-medium rounded-xl hover:bg-indigo-700 transition-colors">
                연습 시작하기
            </a>
        </div>

        <!-- 데이터 있을 때 -->
        <div th:if="${totalCount > 0}">

            <!-- 상단 2컬럼 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">

                <!-- 항목별 평균 점수 -->
                <div class="bg-white rounded-2xl p-5 shadow-sm">
                    <h2 class="text-sm font-semibold text-gray-700 mb-4">항목별 평균 점수</h2>
                    <div class="space-y-3.5">
                        <div th:each="score : ${scores}" class="flex items-center gap-3">
                            <span class="text-sm text-gray-600 w-20 shrink-0"
                                  th:text="${score.label()}"
                                  th:classappend="${#lists.contains(weakestKeys, score.key())} ? 'font-semibold text-orange-600' : ''">
                            </span>
                            <div class="flex-1 bg-gray-100 rounded-full h-2.5">
                                <div class="h-2.5 rounded-full transition-all"
                                     th:classappend="${#lists.contains(weakestKeys, score.key())} ? 'bg-orange-400' : 'bg-indigo-500'"
                                     th:style="'width: ' + ${score.pct()} + '%'">
                                </div>
                            </div>
                            <span class="text-sm font-semibold w-8 text-right shrink-0"
                                  th:text="${score.avg()}"
                                  th:classappend="${#lists.contains(weakestKeys, score.key())} ? 'text-orange-600' : 'text-gray-700'">
                            </span>
                        </div>
                    </div>
                    <div th:if="${weakestLabel != null and weakestLabel != ''}"
                         class="mt-4 flex items-start gap-2 bg-orange-50 rounded-xl px-4 py-2.5">
                        <i class="fa-solid fa-triangle-exclamation text-orange-400 text-sm mt-0.5 shrink-0"></i>
                        <span class="text-sm text-orange-700">
                            <span th:text="${weakestLabel}"></span>이(가) 가장 낮아요.
                        </span>
                    </div>
                </div>

                <!-- 유형별 점수 -->
                <div class="bg-white rounded-2xl p-5 shadow-sm">
                    <h2 class="text-sm font-semibold text-gray-700 mb-1">유형별 점수</h2>
                    <p class="text-xs text-gray-400 mb-4">낮은 순 · 미연습 유형 상단 표시</p>
                    <div class="space-y-3">
                        <div th:each="stat : ${typeStats}" class="flex items-center gap-3">
                            <div class="shrink-0 w-36">
                                <span class="text-xs font-medium block"
                                      th:text="${stat.typeLabel()}"
                                      th:classappend="${stat.count() == 0} ? 'text-gray-300' : 'text-gray-600'">
                                </span>
                            </div>
                            <div class="flex-1 bg-gray-100 rounded-full h-2">
                                <div class="h-2 rounded-full"
                                     th:classappend="${stat.count() == 0} ? 'bg-gray-200' : 'bg-teal-400'"
                                     th:style="'width: ' + ${stat.pct()} + '%'">
                                </div>
                            </div>
                            <div class="flex items-center gap-2 shrink-0">
                                <span th:if="${stat.count() == 0}"
                                      class="text-[10px] bg-gray-100 text-gray-400 px-1.5 py-0.5 rounded-md font-medium">미연습</span>
                                <span th:if="${stat.count() > 0}"
                                      class="text-xs text-gray-400" th:text="${stat.count()} + '회'"></span>
                                <span th:if="${stat.count() > 0}"
                                      class="text-sm font-semibold text-gray-700 w-6 text-right" th:text="${stat.avgScore()}"></span>
                                <a th:href="@{/practice/type(type=${stat.typeKey()})}"
                                   class="text-[10px] text-indigo-500 hover:underline font-medium shrink-0">연습</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 콤보 패턴별 성적 -->
            <div class="bg-white rounded-2xl p-5 shadow-sm mb-5">
                <h2 class="text-sm font-semibold text-gray-700 mb-1">콤보별 성적</h2>
                <p class="text-xs text-gray-400 mb-4">낮은 순 · 미연습 콤보 상단 표시</p>
                <div class="space-y-3">
                    <div th:each="stat : ${comboStats}" class="flex items-center gap-3">
                        <div class="shrink-0 w-40">
                            <span class="text-xs font-medium block"
                                  th:text="${stat.label()}"
                                  th:classappend="${stat.count() == 0} ? 'text-gray-300' : 'text-gray-600'">
                            </span>
                        </div>
                        <div class="flex-1 bg-gray-100 rounded-full h-2">
                            <div class="h-2 rounded-full"
                                 th:classappend="${stat.count() == 0} ? 'bg-gray-200' : 'bg-indigo-400'"
                                 th:style="'width: ' + ${stat.pct()} + '%'">
                            </div>
                        </div>
                        <div class="flex items-center gap-2 shrink-0">
                            <span th:if="${stat.count() == 0}"
                                  class="text-[10px] bg-gray-100 text-gray-400 px-1.5 py-0.5 rounded-md font-medium">미연습</span>
                            <span th:if="${stat.count() > 0}"
                                  class="text-xs text-gray-400" th:text="${stat.count()} + '회'"></span>
                            <span th:if="${stat.count() > 0}"
                                  class="text-sm font-semibold text-gray-700 w-6 text-right" th:text="${stat.avgScore()}"></span>
                            <a href="/practice/topics"
                               class="text-[10px] text-indigo-500 hover:underline font-medium shrink-0">연습</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 학습 패턴 분석 (코칭 리포트) -->
            <div class="bg-white rounded-2xl p-5 shadow-sm">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-sm font-semibold text-gray-700">학습 패턴 분석</h2>
                    <a th:if="${coachingAvailable}" href="/analytics/coaching"
                       class="text-xs font-semibold text-indigo-600 border border-indigo-200 px-3 py-1.5 rounded-lg hover:bg-indigo-50 transition-colors">
                        분석 받기
                    </a>
                </div>
                <p th:if="${!coachingAvailable}" class="text-sm text-gray-400">
                    20문항 이상 연습하면 AI 패턴 분석을 받을 수 있어요.
                    <span class="font-medium text-gray-500" th:text="'(현재 ' + ${totalCount} + '문항)'"></span>
                </p>
                <p th:if="${coachingAvailable}" class="text-sm text-gray-500">
                    피드백 패턴과 약한 유형을 AI가 분석해드려요.
                </p>
            </div>

        </div>
    </main>
</div>

</body>
</html>
