<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습 패턴 분석 - Opicnic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="flex min-h-screen">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 p-5 md:p-8 pb-24 md:pb-8 min-w-0">
        <div class="max-w-xl mx-auto">

            <!-- 헤더 -->
            <div class="flex items-center gap-3 mb-6">
                <a href="/analytics" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <i class="fa-solid fa-chevron-left text-sm"></i>
                </a>
                <h1 class="text-xl font-bold text-gray-900">학습 패턴 분석</h1>
            </div>

            <!-- 분석 불가 -->
            <div th:if="${!canGenerate}" class="bg-white rounded-2xl p-8 text-center shadow-sm">
                <i class="fa-solid fa-chart-line text-4xl text-gray-200 mb-4"></i>
                <p class="font-medium text-gray-500">20문항 이상 연습하면 분석을 받을 수 있어요</p>
                <p class="text-sm text-gray-400 mt-1" th:text="'현재 ' + ${totalCount} + '문항 연습 완료'"></p>
            </div>

            <!-- 분석 가능 -->
            <div th:if="${canGenerate}">

                <!-- 최신 리포트 -->
                <div th:if="${latestReport != null}" class="space-y-3 mb-4">

                    <!-- 메타 -->
                    <div class="flex items-center justify-between text-xs text-gray-400 px-1">
                        <div class="flex items-center gap-1">
                            <i class="fa-solid fa-robot text-indigo-400"></i>
                            <span>AI 분석 결과</span>
                        </div>
                        <span th:text="${#temporals.format(latestReport.createdAt, 'M월 d일 HH:mm')} + ' · ' + ${latestReport.basedOnCount} + '문항 기준'"></span>
                    </div>

                    <!-- 요약 -->
                    <div class="bg-indigo-50 rounded-2xl p-4" th:if="${latestReportParsed['summary'] != null}">
                        <p class="text-sm font-medium text-indigo-800" th:text="${latestReportParsed['summary']}"></p>
                    </div>

                    <!-- 요소별 코칭 -->
                    <div th:if="${latestReportParsed['criteria'] != null and !#lists.isEmpty(latestReportParsed['criteria'])}"
                         class="bg-white rounded-2xl p-4 shadow-sm">
                        <h2 class="text-xs font-semibold text-gray-500 mb-3">요소별 분석</h2>
                        <div class="space-y-3">
                            <div th:each="item : ${latestReportParsed['criteria']}" class="flex gap-3">
                                <div class="w-16 shrink-0">
                                    <span class="text-xs font-medium text-indigo-600 bg-indigo-50 rounded-full px-2 py-0.5"
                                          th:text="${item['name']}"></span>
                                </div>
                                <p class="text-sm text-gray-600 leading-relaxed" th:text="${item['advice']}"></p>
                            </div>
                        </div>
                    </div>

                    <!-- 유형별 코칭 -->
                    <div th:if="${latestReportParsed['types'] != null and !#lists.isEmpty(latestReportParsed['types'])}"
                         class="bg-white rounded-2xl p-4 shadow-sm">
                        <h2 class="text-xs font-semibold text-gray-500 mb-3">약한 유형 집중 분석</h2>
                        <div class="space-y-3">
                            <div th:each="item : ${latestReportParsed['types']}" class="flex gap-3">
                                <div class="shrink-0">
                                    <span class="text-xs font-medium text-orange-600 bg-orange-50 rounded-full px-2 py-0.5"
                                          th:text="${item['label']}"></span>
                                </div>
                                <p class="text-sm text-gray-600 leading-relaxed" th:text="${item['advice']}"></p>
                            </div>
                        </div>
                    </div>

                    <!-- JSON 파싱 실패 fallback: summary만 있을 때 -->
                    <div th:if="${latestReportParsed['criteria'] == null and latestReportParsed['summary'] == null}"
                         class="bg-white rounded-2xl p-5 shadow-sm">
                        <p class="text-sm text-gray-700 leading-relaxed whitespace-pre-line"
                           th:text="${latestReport.content}"></p>
                    </div>
                </div>

                <!-- 생성/재생성 버튼 -->
                <form th:action="@{/analytics/coaching}" method="post">
                    <button type="submit"
                            class="w-full flex items-center justify-center gap-2 py-3 rounded-2xl text-sm font-semibold transition-colors"
                            th:classappend="${latestReport != null} ? 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50' : 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-sm'">
                        <i class="fa-solid fa-wand-magic-sparkles text-xs"></i>
                        <span th:text="${latestReport != null} ? '다시 분석받기' : 'AI 분석 받기'"></span>
                    </button>
                </form>

                <!-- 이전 리포트 이력 -->
                <div th:if="${#lists.size(reports) > 1}" class="mt-6">
                    <h2 class="text-sm font-semibold text-gray-500 mb-3">이전 분석 기록</h2>
                    <div class="space-y-3">
                        <div th:each="report, stat : ${reports}"
                             th:if="${stat.index > 0}"
                             class="bg-white rounded-2xl p-4 shadow-sm">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-xs font-medium text-gray-500"
                                      th:text="${#temporals.format(report.createdAt, 'yyyy.M.d HH:mm')}"></span>
                                <span class="text-xs text-gray-400"
                                      th:text="${report.basedOnCount} + '문항 기준'"></span>
                            </div>
                            <p class="text-sm text-gray-600 leading-relaxed line-clamp-3"
                               th:text="${report.content}"></p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
</div>

</body>
</html>
