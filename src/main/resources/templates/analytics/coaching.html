<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습 패턴 분석 - Opicnic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="flex min-h-screen">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 p-5 md:p-8 pb-24 md:pb-8 min-w-0">
        <div class="max-w-xl mx-auto">

            <!-- 헤더 -->
            <div class="flex items-center gap-3 mb-6">
                <a href="/analytics" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <i class="fa-solid fa-chevron-left text-sm"></i>
                </a>
                <h1 class="text-xl font-bold text-gray-900">학습 패턴 분석</h1>
            </div>

            <!-- 분석 불가 -->
            <div th:if="${!canGenerate}" class="bg-white rounded-2xl p-8 text-center shadow-sm">
                <i class="fa-solid fa-chart-line text-4xl text-gray-200 mb-4"></i>
                <p class="font-medium text-gray-500" th:text="${coachingMinCount} + '문항 이상 연습하면 분석을 받을 수 있어요'"></p>
                <p class="text-sm text-gray-400 mt-1" th:text="'현재 ' + ${totalCount} + '문항 연습 완료'"></p>
            </div>

            <!-- 분석 가능 -->
            <div th:if="${canGenerate}">

                <!-- 최신 리포트 -->
                <div th:if="${latestReport != null}" class="space-y-3 mb-4">

                    <!-- 메타 -->
                    <div class="flex items-center justify-between text-xs text-gray-400 px-1">
                        <div class="flex items-center gap-1">
                            <i class="fa-solid fa-robot text-gray-400"></i>
                            <span>AI 분석 결과</span>
                        </div>
                        <span th:text="${#temporals.format(latestReport.createdAt, 'M월 d일 HH:mm')} + ' · ' + ${latestReport.basedOnCount} + '문항 기준'"></span>
                    </div>

                    <!-- 요약 -->
                    <div class="bg-gray-50 rounded-2xl p-4 space-y-2" th:if="${latestReportParsed['summary'] != null}">
                        <p class="text-sm font-medium text-gray-800" th:text="${latestReportParsed['summary']}"></p>
                        <div th:if="${latestReportParsed['strength'] != null}"
                             class="flex items-start gap-2 pt-1">
                            <i class="fa-solid fa-circle-check text-brand-500 text-xs mt-0.5 shrink-0"></i>
                            <p class="text-sm text-brand-700" th:text="${latestReportParsed['strength']}"></p>
                        </div>
                    </div>

                    <!-- 요소별 코칭 -->
                    <div th:if="${latestReportParsed['criteria'] != null and !#lists.isEmpty(latestReportParsed['criteria'])}"
                         class="bg-white rounded-2xl p-4 shadow-sm">
                        <h2 class="text-xs font-semibold text-gray-500 mb-3">요소별 분석</h2>
                        <div class="space-y-4">
                            <div th:each="item : ${latestReportParsed['criteria']}" class="space-y-1.5">
                                <span class="shrink-0 whitespace-nowrap text-xs font-semibold text-brand-600 bg-brand-50 rounded-full px-2.5 py-0.5"
                                      th:text="${item['name']}"></span>
                                <p th:if="${item['analysis'] != null}" class="text-xs text-gray-400 leading-relaxed pl-1" th:text="${item['analysis']}"></p>
                                <p class="text-sm text-gray-700 leading-relaxed pl-1" th:text="${item['advice']}"></p>
                            </div>
                        </div>
                    </div>

                    <!-- 유형별 코칭 -->
                    <div th:if="${latestReportParsed['types'] != null and !#lists.isEmpty(latestReportParsed['types'])}"
                         class="bg-white rounded-2xl p-4 shadow-sm">
                        <h2 class="text-xs font-semibold text-gray-500 mb-3">약한 유형 집중 분석</h2>
                        <div class="space-y-4">
                            <div th:each="item : ${latestReportParsed['types']}" class="space-y-1.5">
                                <span class="text-xs font-semibold text-rose-800 bg-rose-50 rounded-full px-2.5 py-0.5"
                                      th:text="${item['label']}"></span>
                                <p th:if="${item['pattern'] != null}" class="text-xs text-gray-400 leading-relaxed pl-1" th:text="${item['pattern']}"></p>
                                <p class="text-sm text-gray-700 leading-relaxed pl-1" th:text="${item['strategy'] != null} ? ${item['strategy']} : ${item['advice']}"></p>
                            </div>
                        </div>
                    </div>

                    <!-- 이번 주 과제 -->
                    <div th:if="${latestReportParsed['this_week'] != null}"
                         class="bg-brand-600 rounded-2xl p-4">
                        <h2 class="text-xs font-semibold text-brand-200 mb-1.5">이번 주 집중 과제</h2>
                        <p class="text-sm font-medium text-white leading-relaxed" th:text="${latestReportParsed['this_week']}"></p>
                    </div>

                    <!-- JSON 파싱 실패 fallback -->
                    <div th:if="${latestReportParsed['criteria'] == null and latestReportParsed['summary'] == null}"
                         class="bg-white rounded-2xl p-5 shadow-sm">
                        <p class="text-sm text-gray-700 leading-relaxed whitespace-pre-line"
                           th:text="${latestReport.content}"></p>
                    </div>
                </div>

                <!-- 생성/재생성 버튼 -->
                <form th:action="@{/analytics/coaching}" method="post">
                    <button type="submit"
                            class="w-full flex items-center justify-center gap-2 py-3 rounded-2xl text-sm font-semibold transition-colors"
                            th:classappend="${latestReport != null} ? 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50' : 'bg-brand-600 text-white hover:bg-brand-700 shadow-sm'">
                        <i class="fa-solid fa-wand-magic-sparkles text-xs"></i>
                        <span th:text="${latestReport != null} ? '다시 분석받기' : 'AI 분석 받기'"></span>
                    </button>
                </form>

                <!-- 이전 리포트 이력 -->
                <div th:if="${#lists.size(reports) > 1}" class="mt-6">
                    <h2 class="text-sm font-semibold text-gray-500 mb-3">이전 분석 기록</h2>
                    <div class="space-y-2">
                        <div th:each="report, stat : ${reports}"
                             th:if="${stat.index > 0}"
                             class="bg-white rounded-2xl shadow-sm overflow-hidden">
                            <button th:onclick="|this.nextElementSibling.classList.toggle('hidden')|"
                                    class="w-full flex items-center justify-between px-4 py-3 text-left hover:bg-gray-50 transition-colors">
                                <span class="text-xs font-medium text-gray-600"
                                      th:text="${#temporals.format(report.createdAt, 'yyyy.M.d HH:mm')}"></span>
                                <div class="flex items-center gap-2">
                                    <span class="text-xs text-gray-400" th:text="${report.basedOnCount} + '문항 기준'"></span>
                                    <i class="fa-solid fa-chevron-down text-xs text-gray-300"></i>
                                </div>
                            </button>
                            <div class="hidden px-4 pb-4">
                                <p class="text-sm text-gray-600 leading-relaxed whitespace-pre-line"
                                   th:text="${report.content}"></p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
</div>

</body>
</html>
