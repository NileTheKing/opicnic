<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시험 준비 - Opicnic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"/>
    <style>
        .flatpickr-calendar { font-family: inherit; border-radius: 1rem; border: 1px solid #e5e7eb; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .flatpickr-day.selected, .flatpickr-day.selected:hover { background: #4f46e5; border-color: #4f46e5; }
        .flatpickr-day:hover { background: #eef2ff; }
        .flatpickr-months .flatpickr-month { color: #1f2937; }
        .flatpickr-current-month .cur-month, .flatpickr-current-month input.cur-year { color: #1f2937; font-weight: 700; }
        .sel-card:has(input:checked) { border-color: rgb(99 102 241) !important; background-color: rgb(99 102 241) !important; color: white !important; }
        .sel-card { transition: all 150ms ease; }
        .sel-card:not(:has(input:checked)):hover { border-color: rgb(165 180 252); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="flex min-h-screen">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 p-5 md:p-8 pb-24 md:pb-8 min-w-0">
        <div class="max-w-xl mx-auto">

        <div class="mb-6">
            <h1 class="text-xl font-bold text-gray-900">시험 준비</h1>
        </div>

        <!-- 시험 미등록 -->
        <div th:if="${schedule == null}">
            <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100 text-center mb-4">
                <div class="w-14 h-14 bg-indigo-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-calendar-plus text-2xl text-indigo-400"></i>
                </div>
                <p class="text-base font-bold text-gray-800 mb-1">시험일을 등록해보세요</p>
                <p class="text-sm text-gray-400 mb-6">목표에 맞는 맞춤 학습 계획을 만들어드릴게요</p>
                <button onclick="document.getElementById('schedule-form').scrollIntoView({behavior:'smooth'})"
                        class="bg-indigo-600 text-white text-sm font-semibold px-6 py-2.5 rounded-xl hover:bg-indigo-700 transition-colors">
                    시험일 등록하기
                </button>
            </div>
        </div>

        <!-- D-day 헤더 + 학습 계획 (시험 등록 후) -->
        <div th:if="${plan != null}">

            <!-- D-day 배너 -->
            <div class="bg-indigo-600 rounded-2xl p-5 mb-4 text-white">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-indigo-200 text-xs font-medium mb-0.5" th:text="${schedule.examDate} + ' 시험'"></p>
                        <p class="text-4xl font-black" th:text="'D-' + ${plan.daysLeft()}"></p>
                    </div>
                    <div class="text-right">
                        <p class="text-indigo-200 text-xs mb-0.5">목표</p>
                        <p class="text-2xl font-black" th:text="${schedule.targetGrade.label}"></p>
                    </div>
                </div>
                <div th:if="${diagnosis.sufficient()}" class="mt-3 pt-3 border-t border-indigo-500 flex items-center justify-between">
                    <span class="text-indigo-200 text-xs">현재 추정</span>
                    <span class="text-white text-sm font-bold" th:text="${diagnosis.estimatedGrade().label}"></span>
                </div>
            </div>

            <!-- 메시지 -->
            <div class="bg-white rounded-2xl px-4 py-3 mb-4 shadow-sm border border-gray-100">
                <p class="text-sm text-gray-700" th:text="${plan.message()}"></p>
            </div>

            <!-- 이번 주 할 것 -->
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-4">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-sm font-bold text-gray-700">이번 주 할 것</h2>
                    <span class="text-xs text-gray-400" th:text="'주 ' + ${plan.weeklyComboTarget()} + '콤보'"></span>
                </div>
                <div class="flex flex-col gap-2">

                    <!-- 콤보 연습 -->
                    <div class="flex flex-col gap-1.5">
                        <div class="flex items-center justify-between px-4 py-3 bg-gray-50 rounded-xl">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 bg-indigo-100 rounded-lg flex items-center justify-center shrink-0">
                                    <i class="fa-solid fa-layer-group text-indigo-500 text-xs"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-semibold text-gray-800">콤보 연습</p>
                                    <p class="text-xs text-gray-400">하루 <span th:text="${plan.dailyComboTarget()}"></span>회 목표</p>
                                </div>
                            </div>
                            <span class="text-lg font-black text-indigo-600" th:text="${plan.weeklyComboTarget()} + '회'"></span>
                        </div>
                        <div th:if="${!plan.weakCombos().isEmpty()}" class="pl-4 flex flex-col gap-1">
                            <p class="text-[11px] text-indigo-400 px-1 mb-0.5">연습 기록 분석 기반 · 약한 순 추천</p>
                            <th:block th:each="combo, stat : ${plan.weakCombos()}">
                                <a th:if="${stat.index < 2}"
                                   th:href="@{/practice/combo(category=${combo.category()})}"
                                   class="flex items-center justify-between bg-indigo-50 rounded-xl px-3 py-2 hover:bg-indigo-100 transition-colors group">
                                    <div class="flex items-center gap-2">
                                        <span th:if="${combo.count() == 0}"
                                              class="text-[10px] bg-indigo-200 text-indigo-700 px-1.5 py-0.5 rounded font-medium">미연습</span>
                                        <span th:if="${combo.count() > 0}"
                                              class="text-[10px] bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded font-medium">약점</span>
                                        <span class="text-xs text-indigo-700 font-medium" th:text="${combo.label()}"></span>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <span th:if="${combo.count() > 0}" class="text-xs text-indigo-400" th:text="${combo.avgScore()} + '점'"></span>
                                        <span class="text-xs text-indigo-300 group-hover:text-indigo-500 transition-colors">연습 →</span>
                                    </div>
                                </a>
                            </th:block>
                        </div>
                    </div>

                    <!-- 유형 연습 -->
                    <div class="flex flex-col gap-1.5">
                        <div class="flex items-center justify-between px-4 py-3 bg-gray-50 rounded-xl">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 bg-violet-100 rounded-lg flex items-center justify-center shrink-0">
                                    <i class="fa-solid fa-bullseye text-violet-500 text-xs"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-semibold text-gray-800">유형 연습</p>
                                    <p class="text-xs text-gray-400">약한 유형 집중 공략</p>
                                </div>
                            </div>
                        </div>
                        <div th:if="${!plan.weakTypes().isEmpty()}" class="pl-4 flex flex-col gap-1">
                            <p class="text-[11px] text-violet-400 px-1 mb-0.5">연습 기록 분석 기반 · 약한 순 추천</p>
                            <th:block th:each="type, stat : ${plan.weakTypes()}">
                                <a th:if="${stat.index < 2}"
                                   th:href="@{/practice/type(type=${type.typeKey()})}"
                                   class="flex items-center justify-between bg-violet-50 rounded-xl px-3 py-2 hover:bg-violet-100 transition-colors group">
                                    <div class="flex items-center gap-2">
                                        <span th:if="${type.count() == 0}"
                                              class="text-[10px] bg-violet-200 text-violet-700 px-1.5 py-0.5 rounded font-medium">미연습</span>
                                        <span th:if="${type.count() > 0}"
                                              class="text-[10px] bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded font-medium">약점</span>
                                        <span class="text-xs text-violet-700 font-medium" th:text="${type.typeLabel()}"></span>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <span th:if="${type.count() > 0}" class="text-xs text-violet-400" th:text="${type.avgScore()} + '점'"></span>
                                        <span class="text-xs text-violet-300 group-hover:text-violet-500 transition-colors">연습 →</span>
                                    </div>
                                </a>
                            </th:block>
                        </div>
                    </div>

                    <!-- 모의고사 -->
                    <a href="/practice/mock"
                       class="flex items-center justify-between px-4 py-3 bg-gray-50 rounded-xl hover:bg-amber-50 transition-colors group">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-amber-100 rounded-lg flex items-center justify-center shrink-0">
                                <i class="fa-solid fa-file-pen text-amber-500 text-xs"></i>
                            </div>
                            <div>
                                <p class="text-sm font-semibold text-gray-800">모의고사</p>
                                <p class="text-xs text-gray-400"
                                   th:text="${plan.daysLeft() <= 7} ? '시험 막바지, 지금 추천해요' : '실제 시험과 동일한 구성'"></p>
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-gray-300 text-xs group-hover:text-amber-400 transition-colors"></i>
                    </a>

                </div>
            </div>

            <!-- 시험 일정 수정 토글 -->
            <button onclick="toggleScheduleForm()"
                    class="w-full flex items-center justify-between px-4 py-3 bg-white rounded-2xl shadow-sm border border-gray-100 text-sm text-gray-500 hover:text-gray-700 transition-colors mb-2">
                <span>시험 일정 수정</span>
                <i id="schedule-toggle-icon" class="fa-solid fa-chevron-down text-xs transition-transform"></i>
            </button>
        </div>

        <!-- 시험 일정 등록/수정 폼 -->
        <div id="schedule-form"
             th:classappend="${schedule != null} ? 'hidden' : ''"
             class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
            <h2 class="text-sm font-bold text-gray-700 mb-4"
                th:text="${schedule == null ? '시험 일정 등록' : '시험 일정 수정'}"></h2>
            <form th:action="@{/exam/schedule}" method="post" class="space-y-4">

                <!-- 날짜 + 목표 등급 -->
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="text-xs text-gray-500 mb-1 block">시험 날짜</label>
                        <input type="text" id="examDatePicker" name="examDate"
                               th:value="${schedule != null ? schedule.examDate : ''}"
                               placeholder="날짜 선택"
                               class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-indigo-400 cursor-pointer"/>
                    </div>
                    <div class="flex-1">
                        <label class="text-xs text-gray-500 mb-1 block">목표 등급</label>
                        <div class="flex rounded-xl overflow-hidden border border-gray-200">
                            <th:block th:each="grade : ${targetGrades}">
                                <label class="sel-card flex-1 flex items-center justify-center py-2 cursor-pointer border-r border-gray-200 last:border-r-0 bg-white text-gray-500"
                                       th:classappend="${schedule != null && schedule.targetGrade == grade} ? '!border-indigo-500 !bg-indigo-600 !text-white' : ''">
                                    <input type="radio" name="targetGrade" th:value="${grade.name()}" class="sr-only"
                                           th:checked="${schedule != null && schedule.targetGrade == grade}">
                                    <span class="text-xs font-extrabold" th:text="${grade.label}"></span>
                                </label>
                            </th:block>
                        </div>
                    </div>
                </div>

                <!-- 하루 공부 시간 -->
                <div>
                    <label class="text-xs text-gray-500 mb-1.5 block">하루 공부 시간</label>
                    <div class="flex rounded-xl overflow-hidden border border-gray-200">
                        <th:block th:each="opt,s : ${ {30, 60, 90, 120} }">
                            <label class="sel-card flex-1 flex items-center justify-center py-2 cursor-pointer border-r border-gray-200 last:border-r-0 bg-white text-gray-500"
                                   th:classappend="${schedule != null && schedule.dailyMinutes == opt} ? '!border-indigo-500 !bg-indigo-600 !text-white' : (${schedule == null && opt == 60} ? '!border-indigo-500 !bg-indigo-600 !text-white' : '')">
                                <input type="radio" name="dailyMinutes" th:value="${opt}" class="sr-only"
                                       th:checked="${schedule != null ? schedule.dailyMinutes == opt : opt == 60}">
                                <span class="text-xs font-semibold"
                                      th:text="${opt == 30 ? '30분' : opt == 60 ? '1시간' : opt == 90 ? '1.5시간' : '2시간+'}"></span>
                            </label>
                        </th:block>
                    </div>
                </div>

                <!-- 주 공부 일수 -->
                <div>
                    <label class="text-xs text-gray-500 mb-1.5 block">주 공부 일수</label>
                    <div class="flex rounded-xl overflow-hidden border border-gray-200">
                        <th:block th:each="opt : ${ {3, 5, 7} }">
                            <label class="sel-card flex-1 flex items-center justify-center py-2.5 cursor-pointer border-r border-gray-200 last:border-r-0 bg-white text-gray-500"
                                   th:classappend="${schedule != null && schedule.studyDaysPerWeek == opt} ? '!border-indigo-500 !bg-indigo-600 !text-white' : (${schedule == null && opt == 5} ? '!border-indigo-500 !bg-indigo-600 !text-white' : '')">
                                <input type="radio" name="studyDaysPerWeek" th:value="${opt}" class="sr-only"
                                       th:checked="${schedule != null ? schedule.studyDaysPerWeek == opt : opt == 5}">
                                <span class="text-xs font-semibold" th:text="${opt} + '일'"></span>
                            </label>
                        </th:block>
                    </div>
                </div>

                <button type="submit"
                        class="w-full bg-indigo-600 text-white text-sm font-semibold py-2.5 rounded-xl hover:bg-indigo-700 transition-colors"
                        th:text="${schedule == null ? '등록하기' : '수정하기'}">
                </button>
            </form>
        </div>

        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
<script>
    flatpickr("#examDatePicker", {
        locale: "ko",
        dateFormat: "Y-m-d",
        minDate: "today",
        disableMobile: false
    });

    function applySelCard(label, selected) {
        if (selected) {
            label.classList.add('!border-indigo-500', '!bg-indigo-600', '!text-white');
            label.classList.remove('bg-white', 'text-gray-500');
        } else {
            label.classList.remove('!border-indigo-500', '!bg-indigo-600', '!text-white');
            label.classList.add('bg-white', 'text-gray-500');
        }
    }

    document.querySelectorAll('.sel-card input[type="radio"]').forEach(input => {
        input.addEventListener('change', function () {
            const name = this.name;
            document.querySelectorAll(`.sel-card input[name="${name}"]`).forEach(i => {
                applySelCard(i.closest('.sel-card'), false);
            });
            applySelCard(this.closest('.sel-card'), true);
        });
    });

    function toggleScheduleForm() {
        const form = document.getElementById('schedule-form');
        const icon = document.getElementById('schedule-toggle-icon');
        form.classList.toggle('hidden');
        icon.classList.toggle('rotate-180');
    }
</script>
</body>
</html>
