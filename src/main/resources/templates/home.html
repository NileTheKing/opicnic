<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Opicnic</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex">
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="flex-1 flex flex-col">

    <main class="flex-1 p-4 sm:p-6 max-w-3xl mx-auto w-full pb-20 md:pb-6">

        <!-- 비로그인 상태 -->
        <div sec:authorize="!isAuthenticated()" class="text-center py-20">
            <h1 class="text-3xl font-bold text-gray-800 mb-3">OPIc 실전 연습</h1>
            <p class="text-gray-500 mb-8">AI 피드백으로 OPIc 목표 등급을 달성하세요</p>
            <a href="/auth/login"
               class="inline-block bg-indigo-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition">
                카카오로 시작하기
            </a>
        </div>

        <!-- 로그인 상태 -->
        <div sec:authorize="isAuthenticated()">

            <!-- 주제 미설정 경고 -->
            <div th:if="${selectedTopics == null or #lists.isEmpty(selectedTopics)}"
                 class="mb-4 flex items-center gap-3 bg-amber-50 border border-amber-200 text-amber-700 text-sm px-4 py-3 rounded-xl">
                <i class="fas fa-triangle-exclamation"></i>
                <span>연습 주제가 설정되지 않았어요.
                    <a href="/mypage" class="underline font-medium">마이페이지</a>에서 주제를 선택해주세요.</span>
            </div>

            <!-- 히어로: 내 주제 랜덤 연습 -->
            <div class="bg-gradient-to-br from-indigo-600 to-purple-600 rounded-2xl p-7 text-white mb-4 shadow-lg">
                <div class="flex items-start justify-between mb-5">
                    <div>
                        <p class="text-indigo-200 text-sm mb-1">오늘의 연습</p>
                        <h2 class="text-2xl font-bold">내 주제 랜덤 콤보</h2>
                        <p class="text-indigo-200 text-sm mt-1">
                            <span th:if="${selectedTopics != null and not #lists.isEmpty(selectedTopics)}"
                                  th:text="${#lists.size(selectedTopics)} + '개 주제 중 랜덤 선택'"></span>
                            <span th:if="${selectedTopics == null or #lists.isEmpty(selectedTopics)}">주제를 먼저 설정해주세요</span>
                        </p>
                    </div>
                    <div class="w-12 h-12 rounded-2xl bg-white/20 flex items-center justify-center">
                        <i class="fa-solid fa-bullseye text-xl text-white"></i>
                    </div>
                </div>

                <div class="flex gap-3">
                    <a href="/practice/random"
                       th:classappend="${selectedTopics == null or #lists.isEmpty(selectedTopics)} ? 'opacity-50 pointer-events-none' : ''"
                       class="flex-1 bg-white text-indigo-700 font-semibold py-3 rounded-xl text-center hover:bg-indigo-50 transition">
                        바로 시작하기
                    </a>
                    <a href="/practice/surprise"
                       class="flex items-center gap-2 bg-white/20 hover:bg-white/30 text-white font-medium px-5 py-3 rounded-xl transition">
                        <i class="fa-solid fa-bolt"></i> 돌발로 하기
                    </a>
                </div>
            </div>

            <!-- 보조 카드 2개 -->
            <div class="grid grid-cols-2 gap-4">

                <!-- 모의고사 -->
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                    <div class="flex items-center justify-between mb-3">
                        <div class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center">
                            <i class="fa-solid fa-file-lines text-gray-400"></i>
                        </div>
                        <span class="text-xs bg-green-50 text-green-600 px-2 py-0.5 rounded-full">15문항</span>
                    </div>
                    <h3 class="font-bold text-gray-800 mb-1">모의고사</h3>
                    <p class="text-sm text-gray-400 mb-4">실전처럼 15문제 풀기</p>
                    <a href="/practice/mock"
                       th:classappend="${selectedTopics == null or #lists.isEmpty(selectedTopics)} ? 'opacity-50 pointer-events-none' : ''"
                       class="block w-full py-2.5 bg-gray-900 text-white rounded-xl text-sm font-medium text-center hover:bg-gray-800 transition">
                        시작하기
                    </a>
                </div>

                <!-- 집중 연습 -->
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                    <div class="flex items-center justify-between mb-3">
                        <div class="w-10 h-10 rounded-xl bg-indigo-50 flex items-center justify-center">
                            <i class="fa-solid fa-crosshairs text-indigo-500"></i>
                        </div>
                        <span class="text-xs bg-indigo-50 text-indigo-500 px-2 py-0.5 rounded-full">주제·콤보·유형</span>
                    </div>
                    <h3 class="font-bold text-gray-800 mb-1">집중 연습</h3>
                    <p class="text-sm text-gray-400 mb-4">원하는 방식으로 골라서 연습</p>
                    <a href="/practice/focus"
                       class="block w-full py-2.5 bg-indigo-50 text-indigo-600 rounded-xl text-sm font-medium text-center hover:bg-indigo-100 transition">
                        선택하기
                    </a>
                </div>
            </div>

        </div>
    </main>
</div>

</body>
</html>
