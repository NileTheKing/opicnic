<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Opicnic - 말하기 연습</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.6; }
            70% { transform: scale(1.4); opacity: 0; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .recording-ring::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 9999px;
            background: rgba(239,68,68,0.3);
            animation: pulse-ring 1.5s ease-out infinite;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen font-sans flex flex-col">

<!-- 로딩 오버레이 -->
<div id="loading" class="hidden fixed inset-0 bg-white/90 z-50 flex flex-col items-center justify-center gap-4">
    <svg class="animate-spin h-10 w-10 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
    </svg>
    <p class="text-indigo-700 font-semibold">피드백 분석 중입니다. 잠시만 기다려 주세요...</p>
</div>

<!-- 상단 진행 바 -->
<div class="bg-white border-b border-slate-100 px-4 py-3 flex items-center justify-between sticky top-0 z-10 shadow-sm">
    <div class="flex items-center gap-3">
        <span class="text-sm font-bold text-indigo-600">Opicnic</span>
        <span class="text-slate-300">|</span>
        <span id="questionNumber" class="text-sm font-bold text-slate-700">Q1 / 1</span>
    </div>
    <div id="topicBadge" class="text-xs font-semibold text-slate-500 bg-slate-100 px-3 py-1 rounded-full"></div>
</div>

<!-- 진행 도트 -->
<div id="progressContainer" class="flex justify-center gap-1.5 pt-4 px-4"></div>

<main class="flex-1 flex flex-col items-center justify-center px-4 py-6">
    <div id="questionContainer" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sm:p-8 w-full max-w-xl">

        <!-- 문제 텍스트 -->
        <div class="mb-6">
            <p id="questionText" class="text-slate-800 text-base leading-relaxed font-medium">문제 내용</p>
        </div>

        <!-- 인라인 에러 -->
        <div id="inlineError" class="hidden mb-4 flex items-center gap-2 text-sm text-red-600 bg-red-50 border border-red-200 rounded-xl px-4 py-2.5">
            <i class="fa-solid fa-circle-exclamation shrink-0"></i>
            <span id="inlineErrorText"></span>
        </div>

        <!-- 컨트롤 -->
        <div class="flex flex-col items-center gap-5">
            <div class="flex items-center gap-6">
                <!-- 재생 버튼 -->
                <button id="playButton"
                        class="w-14 h-14 rounded-full border-2 border-slate-200 bg-white text-slate-400 flex items-center justify-center transition hover:border-indigo-300 hover:text-indigo-500 disabled:opacity-30 disabled:cursor-not-allowed"
                        disabled>
                    <i class="fa-solid fa-play text-lg"></i>
                </button>

                <!-- 녹음 버튼 -->
                <div class="relative">
                    <button id="recordButton"
                            class="relative w-20 h-20 rounded-full bg-red-500 text-white flex items-center justify-center shadow-lg hover:bg-red-600 transition text-2xl">
                        <i class="fa-solid fa-microphone"></i>
                    </button>
                </div>

                <!-- 정지 버튼 -->
                <button id="stopButton"
                        class="hidden w-14 h-14 rounded-full border-2 border-slate-200 bg-white text-slate-500 flex items-center justify-center transition hover:border-red-300 hover:text-red-500">
                    <i class="fa-solid fa-stop text-lg"></i>
                </button>
            </div>

            <div id="timerDisplay" class="text-slate-500 text-lg font-mono font-semibold tabular-nums">00:00</div>
            <p id="recordingStatus" class="text-sm text-slate-400">마이크 버튼을 눌러 녹음을 시작하세요</p>
        </div>
    </div>

    <!-- 다음 / 제출 버튼 -->
    <div class="mt-5 flex gap-3 w-full max-w-xl">
        <button id="nextButton"
                class="flex-1 py-3 bg-indigo-600 text-white rounded-2xl font-semibold hover:bg-indigo-700 transition disabled:opacity-40 disabled:cursor-not-allowed"
                disabled>
            다음 <i class="fa-solid fa-arrow-right text-sm ml-1"></i>
        </button>
        <button id="submitButton"
                class="hidden flex-1 py-3 bg-green-600 text-white rounded-2xl font-semibold hover:bg-green-700 transition disabled:opacity-40 disabled:cursor-not-allowed"
                disabled>
            제출 <i class="fa-solid fa-check text-sm ml-1"></i>
        </button>
        <button id="retryButton"
                class="hidden flex-1 py-3 bg-amber-500 text-white rounded-2xl font-semibold hover:bg-amber-600 transition disabled:opacity-40 disabled:cursor-not-allowed">
            실패 문항 다시 제출 <i class="fa-solid fa-rotate-right text-sm ml-1"></i>
        </button>
    </div>
</main>

<script th:inline="javascript">
    const questions = /*[[${questions}]]*/ [];
    const attemptId = /*[[${attemptId}]]*/ null;

    const questionNumber   = document.getElementById('questionNumber');
    const topicBadge       = document.getElementById('topicBadge');
    const questionText     = document.getElementById('questionText');
    const progressContainer = document.getElementById('progressContainer');
    const nextButton       = document.getElementById('nextButton');
    const submitButton     = document.getElementById('submitButton');
    const retryButton      = document.getElementById('retryButton');
    const recordButton     = document.getElementById('recordButton');
    const stopButton       = document.getElementById('stopButton');
    const playButton       = document.getElementById('playButton');
    const timerDisplay     = document.getElementById('timerDisplay');
    const recordingStatus  = document.getElementById('recordingStatus');
    const inlineError      = document.getElementById('inlineError');
    const inlineErrorText  = document.getElementById('inlineErrorText');

    let currentQuestionIndex = 0;
    let mediaRecorder, audioChunks = [], audioPlayer;
    let isRecording = false, startTime, timerInterval;
    let recordedAudioBlob;
    let recordings = [];
    let feedbackResults = [];
    let failedIndexes = [];
    let submissionComplete = false;

    function showError(msg) {
        inlineErrorText.textContent = msg;
        inlineError.classList.remove('hidden');
        setTimeout(() => inlineError.classList.add('hidden'), 3000);
    }

    function initializeApp() {
        questions.forEach((_, index) => {
            const dot = document.createElement('div');
            dot.className = 'w-2.5 h-2.5 rounded-full bg-slate-200 transition-colors';
            dot.dataset.question = index;
            progressContainer.appendChild(dot);
        });
        updateProgressIndicators();
        loadQuestion(0);
        setupEventListeners();
    }

    function updateProgressIndicators() {
        document.querySelectorAll('[data-question]').forEach((dot, index) => {
            if (index < currentQuestionIndex) {
                dot.className = 'w-2.5 h-2.5 rounded-full bg-indigo-400 transition-colors';
            } else if (index === currentQuestionIndex) {
                dot.className = 'w-2.5 h-2.5 rounded-full bg-indigo-600 scale-125 transition-colors';
            } else {
                dot.className = 'w-2.5 h-2.5 rounded-full bg-slate-200 transition-colors';
            }
        });
    }

    function loadQuestion(index) {
        const q = questions[index];
        const total = questions.length;

        questionNumber.textContent = 'Q' + (index + 1) + ' / ' + total;
        topicBadge.textContent = q.topic || '';
        questionText.textContent = q.content;

        resetRecordingUI();

        const isLast = index === total - 1;
        nextButton.classList.toggle('hidden', isLast);
        nextButton.disabled = true;
        submitButton.classList.toggle('hidden', !isLast);
        submitButton.disabled = true;
        retryButton.classList.add('hidden');
    }

    function setupEventListeners() {
        recordButton.addEventListener('click', startRecording);
        stopButton.addEventListener('click', stopRecording);
        playButton.addEventListener('click', playRecording);
        nextButton.addEventListener('click', advanceToNextQuestion);
        submitButton.addEventListener('click', submitAllRecordings);
        retryButton.addEventListener('click', retryFailedRecordings);
        window.addEventListener('beforeunload', warnBeforeLeavingWithRecordings);
    }

    function advanceToNextQuestion() {
        if (!recordedAudioBlob) { showError('먼저 녹음해주세요.'); return; }
        recordings[currentQuestionIndex] = recordedAudioBlob;
        currentQuestionIndex++;
        loadQuestion(currentQuestionIndex);
        updateProgressIndicators();
    }

    async function submitAllRecordings() {
        if (recordedAudioBlob) recordings[currentQuestionIndex] = recordedAudioBlob;
        if (!hasAllRecordings()) { showError('모든 문제를 녹음해주세요.'); return; }

        const indexes = questions.map((_, index) => index);
        await submitRecordings('/api/practice-attempts/answers', indexes);
    }

    async function retryFailedRecordings() {
        if (failedIndexes.length === 0) return;
        await submitRecordings('/api/practice-attempts/answers/retry', failedIndexes);
    }

    async function submitRecordings(endpoint, indexes) {
        document.getElementById('loading').classList.remove('hidden');
        submitButton.disabled = true;
        retryButton.disabled = true;

        try {
            const formData = new FormData();
            indexes.forEach(index => {
                const blob = recordings[index];
                if (!blob) throw new Error(`Q${index + 1} 녹음 파일이 없습니다.`);
                formData.append('files', new File([blob], `file_${index + 1}.webm`, { type: 'audio/webm' }));
            });
            formData.append('attemptId', attemptId);
            formData.append('questionIndexes', JSON.stringify(indexes));
            // no questionsJson — server restores questions from attemptId

            const response = await fetch(endpoint, { method: 'POST', body: formData });
            if (!response.ok) throw new Error('피드백 요청에 실패했습니다.');

            const data = await response.json();
            data.results.forEach(item => {
                feedbackResults[item.questionIndex] = item.feedback;
            });
            failedIndexes = data.failedIndexes || [];

            if (failedIndexes.length > 0) {
                document.getElementById('loading').classList.add('hidden');
                retryButton.classList.remove('hidden');
                retryButton.disabled = false;
                showError(`분석 실패 문항 ${failedIndexes.length}개가 있습니다. 다시 제출해 주세요.`);
                return;
            }

            await finalizeFeedback();
        } catch (err) {
            document.getElementById('loading').classList.add('hidden');
            retryButton.disabled = false;
            submitButton.disabled = false;
            showError(err.message || '피드백 요청 중 오류가 발생했습니다.');
        }
    }

    async function finalizeFeedback() {
        const response = await fetch(`/api/practice-attempts/answers/finalize?attemptId=${encodeURIComponent(attemptId)}`, { method: 'POST' });
        if (!response.ok) throw new Error('피드백 결과 확정에 실패했습니다.');

        const data = await response.json();
        submissionComplete = true;
        window.location.href = data.resultUrl;
    }

    function hasAllRecordings() {
        return questions.every((_, index) => recordings[index]);
    }

    function warnBeforeLeavingWithRecordings(event) {
        if (submissionComplete) return;
        if (!recordings.some(Boolean)) return;

        event.preventDefault();
        event.returnValue = '';
    }

    function startRecording() {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    recordedAudioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioPlayer = new Audio(URL.createObjectURL(recordedAudioBlob));
                    playButton.disabled = false;
                    nextButton.disabled = false;
                    submitButton.disabled = false;
                };
                audioChunks = [];
                mediaRecorder.start();
                isRecording = true;

                recordButton.classList.add('recording-ring', 'bg-red-600');
                recordButton.classList.remove('bg-red-500');
                recordButton.classList.add('hidden');
                stopButton.classList.remove('hidden');
                recordingStatus.textContent = '녹음 중...';
                startTime = new Date();
                timerInterval = setInterval(updateTimer, 1000);
            })
            .catch(err => { recordingStatus.textContent = '마이크 접근 오류: ' + err.message; });
    }

    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        isRecording = false;
        recordButton.classList.remove('hidden', 'recording-ring', 'bg-red-600');
        recordButton.classList.add('bg-red-500');
        stopButton.classList.add('hidden');
        clearInterval(timerInterval);
        recordingStatus.textContent = '녹음 완료 — 재생으로 확인하세요';
    }

    function playRecording() {
        if (audioPlayer) audioPlayer.play();
    }

    function resetRecordingUI() {
        recordButton.classList.remove('hidden', 'recording-ring', 'bg-red-600');
        recordButton.classList.add('bg-red-500');
        stopButton.classList.add('hidden');
        playButton.disabled = true;
        recordedAudioBlob = null;
        audioChunks = [];
        timerDisplay.textContent = '00:00';
        recordingStatus.textContent = '마이크 버튼을 눌러 녹음을 시작하세요';
    }

    function updateTimer() {
        if (!isRecording) return;
        const elapsed = Math.floor((new Date() - startTime) / 1000);
        timerDisplay.textContent = pad(Math.floor(elapsed / 60)) + ':' + pad(elapsed % 60);
    }

    function pad(n) { return (n < 10 ? '0' : '') + n; }

    initializeApp();
</script>
</body>
</html>
