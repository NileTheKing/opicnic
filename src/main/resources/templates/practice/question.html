<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Opicnic - 말하기 연습</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50:  '#f0f5fb',
                            100: '#d8e6f3',
                            200: '#b0cce7',
                            300: '#7dacd5',
                            400: '#528db8',
                            500: '#3a729f',
                            600: '#2e5c86',
                            700: '#234870',
                            800: '#17325a',
                            900: '#0e2040',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.6; }
            70% { transform: scale(1.4); opacity: 0; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .recording-ring::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 9999px;
            background: rgba(239,68,68,0.25);
            animation: pulse-ring 1.5s ease-out infinite;
        }
    </style>
</head>

<body class="bg-white min-h-screen font-sans flex flex-col">

<!-- 로딩 오버레이 -->
<div id="loading" class="hidden fixed inset-0 bg-white/95 z-50 flex flex-col items-center justify-center gap-4">
    <svg class="animate-spin h-10 w-10 text-brand-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
    </svg>
    <p class="text-brand-700 font-semibold">피드백 분석 중입니다. 잠시만 기다려 주세요...</p>
</div>

<!-- 종료 확인 모달 -->
<div id="exitModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center px-6">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
        <h3 class="text-base font-bold text-gray-800 mb-1">연습을 종료할까요?</h3>
        <p class="text-sm text-gray-400 mb-6">지금까지 녹음한 내용이 사라져요.</p>
        <div class="flex gap-3">
            <button onclick="document.getElementById('exitModal').classList.add('hidden')"
                    class="flex-1 py-2.5 rounded-xl border border-gray-200 text-sm font-semibold text-gray-600 hover:bg-gray-50 transition-colors">
                계속하기
            </button>
            <button onclick="history.back()"
                    class="flex-1 py-2.5 rounded-xl bg-gray-800 text-white text-sm font-semibold hover:bg-gray-900 transition-colors">
                종료
            </button>
        </div>
    </div>
</div>

<!-- 헤더 -->
<div class="flex items-center gap-3 px-4 py-3 border-b border-gray-100">
    <button id="exitButton"
            class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-400 transition-colors shrink-0">
        <i class="fa-solid fa-xmark text-sm"></i>
    </button>
    <div id="progressBar" class="flex-1 flex gap-1.5"></div>
    <div id="topicBadge" class="text-xs font-semibold text-gray-500 bg-gray-100 px-3 py-1 rounded-full shrink-0 max-w-[7rem] truncate"></div>
</div>

<!-- 질문 영역 -->
<div class="flex-1 flex flex-col px-6 pt-10 pb-6 max-w-xl mx-auto w-full">
    <p id="questionNumber" class="text-xs font-bold text-brand-500 tracking-widest mb-3">Q1</p>
    <p id="questionText" class="text-gray-900 text-xl leading-relaxed font-semibold">문제 내용</p>

    <!-- 인라인 에러 -->
    <div id="inlineError" class="hidden mt-4 flex items-center gap-2 text-sm text-red-600 bg-red-50 border border-red-200 rounded-xl px-4 py-2.5">
        <i class="fa-solid fa-circle-exclamation shrink-0"></i>
        <span id="inlineErrorText"></span>
    </div>
</div>

<!-- 구분선 -->
<div class="h-px bg-gray-100 mx-6"></div>

<!-- 녹음 영역 -->
<div class="flex flex-col items-center px-6 pt-8 pb-4 max-w-xl mx-auto w-full">
    <div class="relative">
        <button id="recordButton"
                class="relative w-20 h-20 rounded-full bg-red-500 text-white flex items-center justify-center shadow-lg hover:bg-red-600 active:scale-95 transition-all text-2xl">
            <i class="fa-solid fa-microphone"></i>
        </button>
    </div>

    <div id="timerDisplay" class="mt-5 text-3xl font-mono font-bold text-gray-800 tabular-nums">00:00</div>
    <p id="recordingStatus" class="mt-2 text-sm text-gray-400">마이크 버튼을 눌러 녹음을 시작하세요</p>

    <div class="flex items-center gap-5 mt-6">
        <button id="playButton"
                class="flex items-center gap-1.5 px-4 py-2 rounded-xl border border-gray-200 text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                disabled>
            <i class="fa-solid fa-play text-xs"></i> 재생
        </button>
        <button id="stopButton"
                class="hidden flex items-center gap-1.5 px-4 py-2 rounded-xl border border-gray-200 text-sm font-medium text-gray-500 hover:bg-gray-50 transition-colors">
            <i class="fa-solid fa-stop text-xs"></i> 정지
        </button>
    </div>
</div>

<!-- 하단 CTA -->
<div class="px-6 pb-8 pt-4 max-w-xl mx-auto w-full">
    <button id="nextButton"
            class="w-full py-4 bg-brand-600 text-white rounded-2xl font-semibold hover:bg-brand-700 active:scale-[0.98] transition-all disabled:opacity-40 disabled:cursor-not-allowed"
            disabled>
        다음 <i class="fa-solid fa-arrow-right text-sm ml-1"></i>
    </button>
    <button id="submitButton"
            class="hidden w-full py-4 bg-brand-600 text-white rounded-2xl font-semibold hover:bg-brand-700 active:scale-[0.98] transition-all disabled:opacity-40 disabled:cursor-not-allowed"
            disabled>
        제출 완료 <i class="fa-solid fa-check text-sm ml-1"></i>
    </button>
    <button id="retryButton"
            class="hidden w-full py-4 bg-gray-700 text-white rounded-2xl font-semibold hover:bg-gray-800 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
        실패 문항 다시 제출 <i class="fa-solid fa-rotate-right text-sm ml-1"></i>
    </button>
</div>

<script th:inline="javascript">
    const questions = /*[[${questions}]]*/ [];
    const attemptId = /*[[${attemptId}]]*/ null;

    const questionNumber    = document.getElementById('questionNumber');
    const topicBadge        = document.getElementById('topicBadge');
    const questionText      = document.getElementById('questionText');
    const progressBar       = document.getElementById('progressBar');
    const nextButton        = document.getElementById('nextButton');
    const submitButton      = document.getElementById('submitButton');
    const retryButton       = document.getElementById('retryButton');
    const recordButton      = document.getElementById('recordButton');
    const stopButton        = document.getElementById('stopButton');
    const playButton        = document.getElementById('playButton');
    const timerDisplay      = document.getElementById('timerDisplay');
    const recordingStatus   = document.getElementById('recordingStatus');
    const inlineError       = document.getElementById('inlineError');
    const inlineErrorText   = document.getElementById('inlineErrorText');

    let currentQuestionIndex = 0;
    let mediaRecorder, audioChunks = [], audioPlayer;
    let isRecording = false, startTime, timerInterval;
    let recordedAudioBlob;
    let recordings = [];
    let feedbackResults = [];
    let failedIndexes = [];
    let submissionComplete = false;

    document.getElementById('exitButton').addEventListener('click', () => {
        document.getElementById('exitModal').classList.remove('hidden');
    });

    function showError(msg) {
        inlineErrorText.textContent = msg;
        inlineError.classList.remove('hidden');
        setTimeout(() => inlineError.classList.add('hidden'), 3000);
    }

    function initializeApp() {
        updateProgressBar();
        loadQuestion(0);
        setupEventListeners();
    }

    function updateProgressBar() {
        progressBar.innerHTML = '';
        questions.forEach((_, i) => {
            const seg = document.createElement('div');
            seg.className = 'flex-1 h-2 rounded-full transition-colors duration-300 ' +
                (i <= currentQuestionIndex ? 'bg-brand-500' : 'bg-gray-200');
            progressBar.appendChild(seg);
        });
    }

    function loadQuestion(index) {
        const q = questions[index];
        const total = questions.length;

        questionNumber.textContent = 'Q' + (index + 1) + (total > 1 ? ' / ' + total : '');
        topicBadge.textContent = q.topic || '';
        questionText.textContent = q.content;

        updateProgressBar();
        resetRecordingUI();

        const isLast = index === total - 1;
        nextButton.classList.toggle('hidden', isLast);
        nextButton.disabled = true;
        submitButton.classList.toggle('hidden', !isLast);
        submitButton.disabled = true;
        retryButton.classList.add('hidden');
    }

    function setupEventListeners() {
        recordButton.addEventListener('click', startRecording);
        stopButton.addEventListener('click', stopRecording);
        playButton.addEventListener('click', playRecording);
        nextButton.addEventListener('click', advanceToNextQuestion);
        submitButton.addEventListener('click', submitAllRecordings);
        retryButton.addEventListener('click', retryFailedRecordings);
        window.addEventListener('beforeunload', warnBeforeLeavingWithRecordings);
    }

    function advanceToNextQuestion() {
        if (!recordedAudioBlob) { showError('먼저 녹음해주세요.'); return; }
        recordings[currentQuestionIndex] = recordedAudioBlob;
        currentQuestionIndex++;
        loadQuestion(currentQuestionIndex);
    }

    async function submitAllRecordings() {
        if (recordedAudioBlob) recordings[currentQuestionIndex] = recordedAudioBlob;
        if (!hasAllRecordings()) { showError('모든 문제를 녹음해주세요.'); return; }
        const indexes = questions.map((_, i) => i);
        await submitRecordings('/api/practice-attempts/answers', indexes);
    }

    async function retryFailedRecordings() {
        if (failedIndexes.length === 0) return;
        await submitRecordings('/api/practice-attempts/answers/retry', failedIndexes);
    }

    async function submitRecordings(endpoint, indexes) {
        document.getElementById('loading').classList.remove('hidden');
        submitButton.disabled = true;
        retryButton.disabled = true;

        try {
            const formData = new FormData();
            indexes.forEach(index => {
                const blob = recordings[index];
                if (!blob) throw new Error(`Q${index + 1} 녹음 파일이 없습니다.`);
                formData.append('files', new File([blob], `file_${index + 1}.webm`, { type: 'audio/webm' }));
            });
            formData.append('attemptId', attemptId);
            formData.append('questionIndexes', JSON.stringify(indexes));

            const response = await fetch(endpoint, { method: 'POST', body: formData });
            if (!response.ok) throw new Error('피드백 요청에 실패했습니다.');

            const data = await response.json();
            data.results.forEach(item => { feedbackResults[item.questionIndex] = item.feedback; });
            failedIndexes = data.failedIndexes || [];

            if (failedIndexes.length > 0) {
                document.getElementById('loading').classList.add('hidden');
                retryButton.classList.remove('hidden');
                retryButton.disabled = false;
                showError(`분석 실패 문항 ${failedIndexes.length}개가 있습니다. 다시 제출해 주세요.`);
                return;
            }

            await finalizeFeedback();
        } catch (err) {
            document.getElementById('loading').classList.add('hidden');
            retryButton.disabled = false;
            submitButton.disabled = false;
            showError(err.message || '피드백 요청 중 오류가 발생했습니다.');
        }
    }

    async function finalizeFeedback() {
        const response = await fetch(`/api/practice-attempts/answers/finalize?attemptId=${encodeURIComponent(attemptId)}`, { method: 'POST' });
        if (!response.ok) throw new Error('피드백 결과 확정에 실패했습니다.');
        const data = await response.json();
        submissionComplete = true;
        window.location.href = data.resultUrl;
    }

    function hasAllRecordings() {
        return questions.every((_, i) => recordings[i]);
    }

    function warnBeforeLeavingWithRecordings(event) {
        if (submissionComplete) return;
        if (!recordings.some(Boolean)) return;
        event.preventDefault();
        event.returnValue = '';
    }

    function startRecording() {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    recordedAudioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioPlayer = new Audio(URL.createObjectURL(recordedAudioBlob));
                    playButton.disabled = false;
                    nextButton.disabled = false;
                    submitButton.disabled = false;
                };
                audioChunks = [];
                mediaRecorder.start();
                isRecording = true;

                recordButton.classList.add('recording-ring', 'bg-red-600');
                recordButton.classList.remove('bg-red-500');
                recordButton.classList.add('hidden');
                stopButton.classList.remove('hidden');
                recordingStatus.textContent = '녹음 중...';
                startTime = new Date();
                timerInterval = setInterval(updateTimer, 1000);
            })
            .catch(err => { recordingStatus.textContent = '마이크 접근 오류: ' + err.message; });
    }

    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        isRecording = false;
        recordButton.classList.remove('hidden', 'recording-ring', 'bg-red-600');
        recordButton.classList.add('bg-red-500');
        stopButton.classList.add('hidden');
        clearInterval(timerInterval);
        recordingStatus.textContent = '녹음 완료 · 재생으로 확인하세요';
    }

    function playRecording() {
        if (audioPlayer) audioPlayer.play();
    }

    function resetRecordingUI() {
        recordButton.classList.remove('hidden', 'recording-ring', 'bg-red-600');
        recordButton.classList.add('bg-red-500');
        stopButton.classList.add('hidden');
        playButton.disabled = true;
        recordedAudioBlob = null;
        audioChunks = [];
        timerDisplay.textContent = '00:00';
        recordingStatus.textContent = '마이크 버튼을 눌러 녹음을 시작하세요';
    }

    function updateTimer() {
        if (!isRecording) return;
        const elapsed = Math.floor((new Date() - startTime) / 1000);
        timerDisplay.textContent = pad(Math.floor(elapsed / 60)) + ':' + pad(elapsed % 60);
    }

    function pad(n) { return (n < 10 ? '0' : '') + n; }

    initializeApp();
</script>
</body>
</html>
