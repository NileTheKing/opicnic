<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Opicnic - 말하기 연습</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .recording {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .question-sidebar {
            width: 250px;
        }
        .question-sidebar-item {
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .question-sidebar-item:hover {
            background-color: #f7fafc;
        }
        .question-sidebar-item.active {
            background-color: #e0f2fe;
            color: #1e40af;
            font-weight: 600;
        }
    </style>
</head>



<body class="bg-gray-50 min-h-screen font-sans flex">

<div id="loading" class="hidden fixed inset-0 bg-white bg-opacity-90 z-50 flex flex-col items-center justify-center">
    <svg class="animate-spin h-10 w-10 text-indigo-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8v8H4z"/>
    </svg>
    <p class="text-indigo-700 font-semibold text-lg">피드백 분석 중입니다. 잠시만 기다려 주세요...</p>
</div>



<div class="flex-1 flex flex-col">
    <nav th:replace="fragments/header::header"></nav>

    <div class="max-w-2xl mx-auto mt-10 px-4 w-full">
        <div id="questionContainer" class="bg-white rounded-xl shadow-md p-8">
            <div class="mb-8">
                <div class="flex items-center mb-4">
                    <div class="bg-blue-100 text-blue-600 rounded-full w-12 h-12 flex items-center justify-center mr-4">
                        <i class="fas fa-language text-xl"></i>
                    </div>
                    <h2 id="questionTitle" class="text-xl font-semibold text-gray-800" ></h2>
                </div>
                <div class="bg-gray-50 rounded-lg p-4 border border-gray-200">
                    <p id="questionText" class="text-gray-700" >문제 내용</p>
                    <p id="questionHint" class="text-sm text-gray-500 mt-2"></p>
                </div>
            </div>

            <div class="flex flex-col items-center space-y-6">
                <div class="flex space-x-6">
                    <button id="playButton" class="bg-blue-500 text-white rounded-full w-20 h-20 flex items-center justify-center hover:bg-blue-600 transition-colors group" disabled>
                        <i class="fas fa-play text-2xl"></i>
                        <span class="sr-only">문제 재생</span>
                    </button>
                    <button id="recordButton" class="bg-red-500 text-white rounded-full w-20 h-20 flex items-center justify-center hover:bg-red-600 transition-colors group">
                        <i class="fas fa-microphone text-2xl"></i>
                        <span class="sr-only">녹음 시작</span>
                    </button>
                    <button id="stopButton" class="bg-gray-500 text-white rounded-full w-20 h-20 flex items-center justify-center hover:bg-gray-600 transition-colors group hidden" disabled>
                        <i class="fas fa-stop text-2xl"></i>
                        <span class="sr-only">녹음 정지</span>
                    </button>
                </div>
                <div id="timerDisplay" class="text-gray-600 text-lg font-medium">
                    00:00
                </div>
                <div id="recordingStatus" class="text-sm text-gray-500 italic">
                    준비된 주제에 대해 말씀해주세요
                </div>
            </div>
        </div>

        <div id="progressContainer" class="mt-6 flex justify-center space-x-2">
        </div>

        <div class="mt-6 text-center">
            <button id="nextButton" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors">
                다음
            </button>
            <button id="submitButton" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition-colors hidden">
                제출
            </button>
        </div>
    </div>
    <form id="feedbackForm" action="/practice/combo/feedback" method="POST"
          enctype="multipart/form-data" style="display:none;"></form>
</div>
<script th:inline="javascript">
    // Initialize questions array from Thymeleaf model
    // 이제 questions는 QuestionDto 객체들의 배열입니다.
    const questions = /*[[${questions}]]*/ [];

    // UI Elements
    const questionTitle = document.getElementById('questionTitle');
    const questionText = document.getElementById('questionText');
    const questionHint = document.getElementById('questionHint');
    const progressContainer = document.getElementById('progressContainer');
    const nextButton = document.getElementById('nextButton');
    const submitButton = document.getElementById('submitButton');
    const recordButton = document.getElementById('recordButton');
    const stopButton = document.getElementById('stopButton');
    const playButton = document.getElementById('playButton');
    const timerDisplay = document.getElementById('timerDisplay');
    const recordingStatus = document.getElementById('recordingStatus');

    let currentQuestionIndex = 0;
    let mediaRecorder;
    let audioChunks = [];
    let audioPlayer;
    let isRecording = false;
    let startTime;
    let timerInterval;
    let recordedAudioBlob;
    let recordings = []; // 녹음된 오디오 Blob을 저장하는 배열

    // Initialize the application
    function initializeApp() {
        // Create progress indicators
        questions.forEach((_, index) => {
            const progressDot = document.createElement('div');
            progressDot.classList.add('w-4', 'h-4', 'rounded-full', 'bg-gray-300');
            progressDot.setAttribute('data-question', index);
            progressContainer.appendChild(progressDot);
        });

        updateProgressIndicators();
        loadQuestion(currentQuestionIndex);
        setupEventListeners();
    }

    function updateProgressIndicators() {
        const progressDots = document.querySelectorAll('[data-question]');
        progressDots.forEach((dot, index) => {
            dot.classList.remove('bg-blue-600', 'bg-gray-300');
            if (index < currentQuestionIndex) {
                dot.classList.add('bg-blue-600'); // 완료된 질문
            } else if (index === currentQuestionIndex) {
                dot.classList.add('bg-blue-600'); // 현재 질문
            } else {
                dot.classList.add('bg-gray-300'); // 미완료 질문
            }
        });
    }

    function loadQuestion(index) {
        const question = questions[index];
        // QuestionDto에 topic과 difficulty가 있으므로 이제 사용 가능
        questionTitle.textContent = question.topic + ' - ' + question.difficulty + ' 연습';
        questionText.textContent = question.content;
        questionHint.textContent = ''; // 필요하다면 DTO에 힌트 필드를 추가하여 사용

        resetRecordingUI();

        nextButton.style.display = index < questions.length - 1 ? 'inline-block' : 'none';
        submitButton.style.display = index === questions.length - 1 ? 'inline-block' : 'none';
    }

    function setupEventListeners() {
        recordButton.addEventListener('click', () => {
            if (!isRecording) {
                startRecording();
            } else {
                // 이 경우는 없어야 하지만, 만약을 대비
                stopRecording();
            }
        });

        stopButton.addEventListener('click', stopRecording);
        playButton.addEventListener('click', playRecording);
        nextButton.addEventListener('click', advanceToNextQuestion);
        submitButton.addEventListener('click', submitAllRecordings);
    }

    function advanceToNextQuestion() {
        if (recordedAudioBlob) {
            recordings[currentQuestionIndex] = recordedAudioBlob; // 현재 질문의 녹음본 저장
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion(currentQuestionIndex);
                updateProgressIndicators();
            }
        } else {
            alert('먼저 녹음해주세요.');
        }
    }

    function submitAllRecordings() {
        if (recordedAudioBlob) {
            recordings[currentQuestionIndex] = recordedAudioBlob; // 마지막 질문의 녹음본 저장
        }

        if (recordings.length !== questions.length) {
            alert('모든 문제를 녹음해주세요.');
            return;
        }

        const form = document.getElementById('feedbackForm');
        form.innerHTML = ''; // 기존 input 초기화

        // 녹음 파일들 첨부
        recordings.forEach((blob, index) => {
            // 파일명은 Spring이 MultipartFile을 구분할 수 있도록 고유하게 설정
            const file = new File([blob], `file_${index + 1}.wav`, { type: 'audio/wav' });

            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.name = 'files'; // Spring에서 @RequestParam("files") List<MultipartFile> files로 받을 이름
            const dt = new DataTransfer();
            dt.items.add(file);
            fileInput.files = dt.files;

            form.appendChild(fileInput);
        });

        // QuestionDto 정보 담기
        questions.forEach((question, index) => {
            // DTO에 있는 모든 필드를 보냅니다.
            ['id', 'content', 'topic', 'difficulty'].forEach(key => {
                const input = document.createElement('input');
                input.type = 'hidden';
                // Spring의 @ModelAttribute QuestionWrapperDTO에 매핑되도록 필드명 설정
                input.name = `questions[${index}].${key}`;
                input.value = question[key] || ''; // 해당 필드의 값이 없으면 빈 문자열
                form.appendChild(input);
            });
        });

        // 로딩 화면 표시
        document.getElementById('loading').classList.remove('hidden');

        // 폼 전송
        form.submit();
    }

    function startRecording() {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                mediaRecorder.onstop = () => {
                    recordedAudioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(recordedAudioBlob);
                    audioPlayer = new Audio();
                    audioPlayer.src = audioUrl;
                    playButton.disabled = false; // 녹음 완료 후 재생 버튼 활성화
                };
                audioChunks = []; // 새로운 녹음을 위해 청크 배열 초기화
                mediaRecorder.start();
                isRecording = true;
                recordButton.classList.remove('bg-red-500');
                recordButton.classList.add('bg-red-600', 'recording', 'hidden'); // 녹음 중 버튼 숨기기
                if (stopButton) {
                    stopButton.disabled = false;
                    stopButton.classList.remove('hidden'); // 정지 버튼 표시
                }
                recordingStatus.textContent = '녹음 중입니다...';
                startTime = new Date();
                timerInterval = setInterval(updateTimer, 1000);
            })
            .catch(error => {
                console.error('Error accessing microphone:', error);
                recordingStatus.textContent = '마이크 접근 오류: ' + error.message;
            });
    }

    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
        }
        isRecording = false;
        recordButton.classList.remove('hidden'); // 녹음 완료 후 녹음 버튼 다시 표시
        stopButton.classList.add('hidden'); // 정지 버튼 숨기기
        clearInterval(timerInterval); // 타이머 중지
        timerInterval = null;
        recordingStatus.textContent = '녹음이 완료되었습니다.';
    }

    function playRecording() {
        if (audioPlayer) {
            audioPlayer.play();
        }
    }

    function resetRecordingUI() {
        recordButton.classList.remove('hidden', 'recording', 'bg-red-600');
        recordButton.classList.add('bg-red-500');
        stopButton.classList.add('hidden');
        playButton.disabled = true; // 새로 녹음하기 전까지 재생 비활성화
        recordedAudioBlob = null; // 이전 녹음 데이터 초기화
        audioChunks = [];
        timerDisplay.textContent = '00:00'; // 타이머 초기화
        recordingStatus.textContent = '준비된 주제에 대해 말씀해주세요';
    }

    function updateTimer() {
        if (!isRecording) return; // 녹음 중이 아니면 타이머 업데이트 중지
        const currentTime = new Date();
        const elapsedTime = Math.floor((currentTime - startTime) / 1000);
        const minutes = Math.floor(elapsedTime / 60);
        const seconds = elapsedTime % 60;
        timerDisplay.textContent = `${pad(minutes)}:${pad(seconds)}`;
    }

    function pad(number) {
        return (number < 10 ? '0' : '') + number;
    }

    // Initialize the application when the page loads
    initializeApp();
</script>
</body>
</html>
