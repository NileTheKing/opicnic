<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피드백 - Opicnic</title>
    <script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    brand: {
                        50:  '#f0f5fb',
                        100: '#d8e6f3',
                        200: '#b0cce7',
                        300: '#7dacd5',
                        400: '#528db8',
                        500: '#3a729f',
                        600: '#2e5c86',
                        700: '#234870',
                        800: '#17325a',
                        900: '#0e2040',
                    }
                }
            }
        }
    }
</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="max-w-xl mx-auto px-4 py-6 pb-16">

    <!-- 탑바 -->
    <div class="flex items-center justify-between mb-6">
        <a href="/" class="flex items-center gap-2 text-sm text-gray-500 hover:text-gray-700 transition-colors">
            <i class="fa-solid fa-chevron-left text-xs"></i>
            <span>홈</span>
        </a>
        <span class="text-sm font-semibold text-gray-900">연습 결과</span>
        <div class="w-10"></div>
    </div>

    <!-- 문항 카드 -->
    <div class="space-y-4" th:each="feedback, iterStat : ${feedbackResults}">

        <!-- 실패 카드 -->
        <div th:if="${feedback.failed}" class="bg-white rounded-2xl overflow-hidden shadow-sm">
            <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
                <span class="text-sm font-semibold text-gray-700"
                      th:text="'문항 ' + ${iterStat.count}"></span>
            </div>
            <div class="px-5 py-4">
                <p class="text-sm text-gray-500 mb-3 leading-relaxed"
                   th:text="${feedback.question.content}"></p>
                <div class="flex items-center gap-2 bg-red-50 rounded-xl px-4 py-3">
                    <i class="fa-solid fa-circle-exclamation text-red-400 text-sm shrink-0"></i>
                    <p class="text-sm text-red-600">분석에 실패했습니다. 다시 시도해 주세요.</p>
                </div>
            </div>
        </div>

        <!-- 정상 카드 -->
        <div th:unless="${feedback.failed}" class="bg-white rounded-2xl overflow-hidden shadow-sm">

            <!-- 카드 헤더: 문항번호 + 등급 -->
            <div class="px-5 pt-5 pb-4">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-xs font-medium text-gray-400"
                          th:text="'문항 ' + ${iterStat.count}"></span>
                    <!-- 등급 배지 -->
                    <span th:if="${feedback.overallGrade != null}"
                          th:text="${feedback.overallGrade}"
                          th:classappend="${feedback.overallGrade == 'AL'} ? 'bg-purple-100 text-purple-700' :
                                          (${feedback.overallGrade == 'IH'} ? 'bg-blue-100 text-blue-700' :
                                          (${feedback.overallGrade.startsWith('IM')} ? 'bg-gray-100 text-brand-700' :
                                          'bg-gray-100 text-gray-500'))"
                          class="text-xs font-bold px-3 py-1 rounded-full"></span>
                </div>
                <p th:if="${feedback.overall != null}"
                   class="text-xs text-gray-400 mt-1 text-right"
                   th:text="${feedback.overall}"></p>

                <!-- 5개 점수 바 -->
                <div class="space-y-2">
                    <div th:if="${feedback.mainPointScore != null}" class="flex items-center gap-3">
                        <span class="text-xs text-gray-400 w-14 shrink-0">핵심전달</span>
                        <div class="flex-1 bg-gray-100 rounded-full h-1.5">
                            <div class="h-1.5 rounded-full bg-gray-500"
                                 th:style="'width: ' + ${feedback.mainPointScore * 20} + '%'"></div>
                        </div>
                        <span class="text-xs font-semibold text-gray-600 w-4 text-right shrink-0"
                              th:text="${feedback.mainPointScore}"></span>
                    </div>
                    <div th:if="${feedback.expressionScore != null}" class="flex items-center gap-3">
                        <span class="text-xs text-gray-400 w-14 shrink-0">표현력</span>
                        <div class="flex-1 bg-gray-100 rounded-full h-1.5">
                            <div class="h-1.5 rounded-full bg-gray-500"
                                 th:style="'width: ' + ${feedback.expressionScore * 20} + '%'"></div>
                        </div>
                        <span class="text-xs font-semibold text-gray-600 w-4 text-right shrink-0"
                              th:text="${feedback.expressionScore}"></span>
                    </div>
                    <div th:if="${feedback.accuracyScore != null}" class="flex items-center gap-3">
                        <span class="text-xs text-gray-400 w-14 shrink-0">정확성</span>
                        <div class="flex-1 bg-gray-100 rounded-full h-1.5">
                            <div class="h-1.5 rounded-full bg-gray-500"
                                 th:style="'width: ' + ${feedback.accuracyScore * 20} + '%'"></div>
                        </div>
                        <span class="text-xs font-semibold text-gray-600 w-4 text-right shrink-0"
                              th:text="${feedback.accuracyScore}"></span>
                    </div>
                    <div th:if="${feedback.fluencyScore != null}" class="flex items-center gap-3">
                        <span class="text-xs text-gray-400 w-14 shrink-0">발화량</span>
                        <div class="flex-1 bg-gray-100 rounded-full h-1.5">
                            <div class="h-1.5 rounded-full bg-gray-500"
                                 th:style="'width: ' + ${feedback.fluencyScore * 20} + '%'"></div>
                        </div>
                        <span class="text-xs font-semibold text-gray-600 w-4 text-right shrink-0"
                              th:text="${feedback.fluencyScore}"></span>
                    </div>
                    <div th:if="${feedback.contentScore != null}" class="flex items-center gap-3">
                        <span class="text-xs text-gray-400 w-14 shrink-0">내용구성</span>
                        <div class="flex-1 bg-gray-100 rounded-full h-1.5">
                            <div class="h-1.5 rounded-full bg-gray-500"
                                 th:style="'width: ' + ${feedback.contentScore * 20} + '%'"></div>
                        </div>
                        <span class="text-xs font-semibold text-gray-600 w-4 text-right shrink-0"
                              th:text="${feedback.contentScore}"></span>
                    </div>
                </div>
            </div>

            <div class="border-t border-gray-100"></div>

            <!-- 세부 피드백 (접기/펼치기) -->
            <div>
                <button onclick="this.nextElementSibling.classList.toggle('hidden'); this.querySelector('.chevron').classList.toggle('rotate-180')"
                        class="w-full flex items-center justify-between px-5 py-3.5 text-left">
                    <span class="text-xs font-semibold text-gray-500">세부 피드백</span>
                    <i class="chevron fa-solid fa-chevron-down text-xs text-gray-300 transition-transform duration-200"></i>
                </button>

                <div class="hidden px-5 pb-4 space-y-4">
                    <!-- 질문 -->
                    <div>
                        <p class="text-xs font-medium text-gray-400 mb-1">질문</p>
                        <p class="text-sm text-gray-700 leading-relaxed"
                           th:text="${feedback.question.content}"></p>
                    </div>

                    <!-- 내 답변 -->
                    <div th:if="${feedback.sttText != null and !feedback.sttText.isBlank()}">
                        <p class="text-xs font-medium text-gray-400 mb-1">내 답변</p>
                        <p class="text-sm text-gray-500 leading-relaxed italic"
                           th:text="${feedback.sttText}"></p>
                    </div>

                    <div class="border-t border-gray-100 pt-4 space-y-3">
                        <div th:if="${feedback.mainPoint != null}">
                            <p class="text-xs font-semibold text-gray-500 mb-0.5">핵심전달</p>
                            <p class="text-sm text-gray-600 leading-relaxed" th:text="${feedback.mainPoint}"></p>
                        </div>
                        <div th:if="${feedback.expression != null}">
                            <p class="text-xs font-semibold text-gray-500 mb-0.5">표현력</p>
                            <p class="text-sm text-gray-600 leading-relaxed" th:text="${feedback.expression}"></p>
                        </div>
                        <div th:if="${feedback.accuracy != null}">
                            <p class="text-xs font-semibold text-gray-500 mb-0.5">정확성</p>
                            <p class="text-sm text-gray-600 leading-relaxed" th:text="${feedback.accuracy}"></p>
                        </div>
                        <div th:if="${feedback.fluency != null}">
                            <p class="text-xs font-semibold text-gray-500 mb-0.5">발화량</p>
                            <p class="text-sm text-gray-600 leading-relaxed" th:text="${feedback.fluency}"></p>
                        </div>
                        <div th:if="${feedback.content != null}">
                            <p class="text-xs font-semibold text-gray-500 mb-0.5">내용구성</p>
                            <p class="text-sm text-gray-600 leading-relaxed" th:text="${feedback.content}"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 개선점 -->
            <div th:if="${feedback.improvements != null}" class="px-5 py-4">
                <div class="flex gap-3 bg-amber-50 rounded-xl px-4 py-3">
                    <i class="fa-solid fa-lightbulb text-amber-400 text-sm mt-0.5 shrink-0"></i>
                    <div>
                        <p class="text-xs font-semibold text-amber-700 mb-1">이렇게 바꿔보세요</p>
                        <p class="text-sm text-amber-800 leading-relaxed" th:text="${feedback.improvements}"></p>
                    </div>
                </div>
            </div>

            <!-- 모범 답변 -->
            <div th:if="${feedback.modelAnswer != null}" class="px-5 pb-5">
                <button onclick="this.nextElementSibling.classList.toggle('hidden'); this.querySelector('.chevron2').classList.toggle('rotate-180')"
                        class="w-full flex items-center justify-between bg-gray-50 hover:bg-gray-100 transition-colors rounded-xl px-4 py-3 text-left">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-wand-magic-sparkles text-gray-400 text-xs"></i>
                        <span class="text-xs font-semibold text-brand-700">모범 답변 보기</span>
                    </div>
                    <i class="chevron2 fa-solid fa-chevron-down text-xs text-gray-300 transition-transform duration-200"></i>
                </button>
                <div class="hidden mt-2 px-4 py-3 bg-gray-50 rounded-xl space-y-3">
                    <p class="text-sm text-gray-700 leading-relaxed"
                       th:text="${feedback.modelAnswer}"></p>
                    <div th:if="${feedback.modelAnswerComment != null}" class="pt-2 border-t border-gray-200">
                        <p class="text-xs text-gray-500 leading-relaxed"
                           th:text="${feedback.modelAnswerComment}"></p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- 하단 버튼 -->
    <div class="mt-6 space-y-3">
        <a href="/"
           class="flex items-center justify-center gap-2 w-full py-3.5 bg-brand-600 text-white text-sm font-semibold rounded-2xl hover:bg-brand-700 transition-colors">
            다음 연습하기
        </a>
        <a href="/analytics"
           class="flex items-center justify-center gap-2 w-full py-3 text-sm font-medium text-gray-500 hover:text-gray-700 transition-colors">
            기록 보기
        </a>
    </div>

</div>
</body>
</html>
