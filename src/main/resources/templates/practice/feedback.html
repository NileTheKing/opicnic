<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영어 학습 피드백</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .feedback-card {
            transition: all 0.3s ease;
        }
        .feedback-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .level-IL { color: #6366F1; }
        .level-IM { color: #8B5CF6; }
        .level-IH { color: #EC4899; }
        .level-AL { color: #F59E0B; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="container mx-auto px-4 py-8">
    <header class="mb-10">
        <div class="flex items-center justify-between">
            <h1 class="text-3xl font-bold text-indigo-600">영어 학습 피드백 결과</h1>
            <div class="text-right">
                <p class="text-gray-500">평가일: <span th:text="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}">2025-04-10</span></p>
            </div>
        </div>
        <div class="mt-4 bg-white p-6 rounded-lg shadow-md">
            <div class="flex items-center space-x-2">
                <i class="fas fa-info-circle text-blue-500 text-xl"></i>
                <p class="text-gray-700">각 문제에 대한 상세 피드백입니다. 각 영역별 평가를 확인하고 개선점을 참고하세요.</p>
            </div>
        </div>
    </header>

    <div class="space-y-8">
        <div class="feedback-card bg-white rounded-xl shadow-md overflow-hidden"
             th:each="feedback, iterStat : ${feedbackList}">
            <div class="bg-indigo-600 p-4">
                <h2 class="text-xl font-semibold text-white flex items-center">
                    <span class="mr-2">Question</span>
                    <span class="bg-white text-indigo-600 rounded-full w-8 h-8 flex items-center justify-center"
                          th:text="${iterStat.count}">1</span>
                </h2>
            </div>

            <div class="p-6">
                <!-- 문제 내용 -->
                <div class="mb-6 bg-indigo-50 p-4 rounded-lg">
                    <h3 class="text-lg font-medium text-gray-800 mb-2">문제</h3>
                    <p class="text-gray-700" th:text="${feedback.question.text}">문제 텍스트</p>
                </div>

                <!-- 사용자 응답 내용 -->
                <div class="mb-6 bg-indigo-50 p-4 rounded-lg">
                    <h3 class="text-lg font-medium text-gray-800 mb-2">응답</h3>
                    <p class="text-gray-700" th:text="${feedback.sttText}">문제 텍스트</p>
                </div>

                <!-- 피드백 영역 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <h4 class="font-medium text-gray-700"><i class="fas fa-book text-indigo-500 mr-2"></i>어휘</h4>
                        <p class="text-gray-600" th:text="${feedback.vocabulary}">어휘 피드백</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <h4 class="font-medium text-gray-700"><i class="fas fa-pen text-indigo-500 mr-2"></i>문법</h4>
                        <p class="text-gray-600" th:text="${feedback.grammar}">문법 피드백</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <h4 class="font-medium text-gray-700"><i class="fas fa-microphone text-indigo-500 mr-2"></i>발음</h4>
                        <p class="text-gray-600" th:text="${feedback.pronunciation}">발음 피드백</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <h4 class="font-medium text-gray-700"><i class="fas fa-comment-dots text-indigo-500 mr-2"></i>유창성</h4>
                        <p class="text-gray-600" th:text="${feedback.fluency}">유창성 피드백</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <h4 class="font-medium text-gray-700"><i class="fas fa-file-alt text-indigo-500 mr-2"></i>내용 구성</h4>
                        <p class="text-gray-600" th:text="${feedback.content}">내용 피드백</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <h4 class="font-medium text-gray-700"><i class="fas fa-star text-indigo-500 mr-2"></i>전반적 평가</h4>
                        <p class="text-gray-600">
                            <span th:text="${feedback.overall}"
                                  th:classappend="|
                                      ${feedback.overall.contains('IL')} ? 'font-bold level-IL' :
                                      ${feedback.overall.contains('IM')} ? 'font-bold level-IM' :
                                      ${feedback.overall.contains('IH')} ? 'font-bold level-IH' :
                                      ${feedback.overall.contains('AL')} ? 'font-bold level-AL' : ''
                                  |">
                            </span>
                        </p>
                    </div>
                </div>

                <!-- 개선점 -->
                <div class="mt-6 bg-yellow-50 p-4 rounded-lg border-l-4 border-yellow-400">
                    <div class="flex">
                        <i class="fas fa-lightbulb text-yellow-400 mr-3"></i>
                        <div>
                            <h3 class="text-sm font-medium text-yellow-800">개선점</h3>
                            <p class="mt-2 text-sm text-yellow-700" th:text="${feedback.improvements}">개선점 텍스트</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 돌아가기 버튼 -->
    <div class="mt-12 mb-6 flex justify-center">
        <a href="/" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none">
            <i class="fas fa-chevron-left mr-2"></i> 홈으로 돌아가기
        </a>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const cards = document.querySelectorAll('.feedback-card');
        cards.forEach((card, index) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100 * index);
        });
    });
</script>
</body>
</html>
