<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>주제 탐색 - Opicnic</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .topic-card { transition: all 150ms ease; }
        .topic-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px 0 rgba(99,102,241,0.12); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex">
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="flex-1 flex flex-col min-w-0">
<main class="flex-1 p-5 sm:p-6 max-w-4xl mx-auto w-full">

    <!-- 히어로 -->
    <section class="relative overflow-hidden rounded-3xl bg-gradient-to-br from-indigo-600 via-violet-600 to-fuchsia-500 p-6 sm:p-8 text-white shadow-xl mb-6">
        <div class="absolute -right-12 -top-16 h-44 w-44 rounded-full bg-white/10 pointer-events-none"></div>
        <div class="absolute bottom-0 right-20 h-24 w-24 rounded-full bg-white/8 pointer-events-none"></div>
        <div class="relative flex flex-col gap-5 sm:flex-row sm:items-end sm:justify-between">
            <div>
                <p class="text-xs font-semibold text-indigo-200 uppercase tracking-widest mb-2">practice topics</p>
                <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight mb-2">주제 탐색</h1>
                <p class="text-sm text-indigo-100">
                    난이도 <span class="font-bold text-white" th:text="${preferredDifficulty.label}"></span>
                    <a href="/mypage" class="ml-2 text-indigo-200 hover:text-white text-xs underline underline-offset-2 transition">변경</a>
                </p>
            </div>
            <div class="grid grid-cols-2 gap-3 shrink-0">
                <div class="rounded-2xl bg-white/15 px-4 py-3 backdrop-blur text-center">
                    <p class="text-[11px] text-indigo-200 mb-0.5">내 주제</p>
                    <p class="text-2xl font-black leading-none" th:text="${myTopicCount}">0</p>
                </div>
                <div class="rounded-2xl bg-white/20 px-4 py-3 backdrop-blur text-center border border-white/20">
                    <p class="text-[11px] text-indigo-200 mb-0.5">전체</p>
                    <p class="text-2xl font-black leading-none" th:text="${topicCount}">0</p>
                </div>
            </div>
        </div>
    </section>

    <!-- ── 내 주제 섹션 ── -->
    <div class="mb-8">
        <div class="flex items-center gap-2 mb-4">
            <div class="w-1 h-5 bg-indigo-500 rounded-full"></div>
            <h2 class="text-base font-extrabold text-slate-800">내 주제</h2>
            <span class="text-xs text-slate-400 font-medium" th:text="${myTopicCount} + '개'"></span>
        </div>

        <!-- empty state -->
        <div th:if="${myTopicCount == 0}"
             class="flex flex-col items-center justify-center py-12 bg-white rounded-2xl border border-dashed border-slate-200 text-center">
            <div class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center mb-3">
                <i class="fa-solid fa-list-check text-slate-400 text-lg"></i>
            </div>
            <p class="text-sm font-semibold text-slate-500 mb-1">설정된 주제가 없어요</p>
            <p class="text-xs text-slate-400 mb-4">온보딩에서 주제를 선택하면 여기에 나타나요</p>
            <a href="/onboarding" class="text-xs font-bold text-indigo-600 hover:text-indigo-700 underline underline-offset-2">설정하러 가기</a>
        </div>

        <!-- 내 주제 카드 그리드 -->
        <div th:unless="${myTopicCount == 0}" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
            <th:block th:each="group : ${topicGroups}">
                <a th:each="topic : ${group.value}"
                   th:if="${myTopics.contains(topic)}"
                   th:href="@{/practice/combo(topic=${topic.name()},difficulty=${preferredDifficulty.name()})}"
                   th:with="icon=${topicIcons[topic]}"
                   class="topic-card relative bg-white rounded-2xl border-2 border-indigo-200 p-4 flex flex-col items-center gap-2.5 shadow-sm text-center cursor-pointer">
                    <div class="w-11 h-11 rounded-xl bg-indigo-50 flex items-center justify-center">
                        <i th:class="'fa-solid ' + ${icon != null ? icon : 'fa-circle-question'} + ' text-xl text-indigo-500'"></i>
                    </div>
                    <p class="text-sm font-bold text-slate-800 leading-snug" th:text="${topic.label}"></p>
                    <span class="inline-flex items-center gap-1 text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-full">
                        <i class="fa-solid fa-play text-[8px]"></i> 연습하기
                    </span>
                </a>
            </th:block>
        </div>
    </div>

    <!-- ── 전체 주제 섹션 ── -->
    <div>
        <div class="flex items-center gap-2 mb-4">
            <div class="w-1 h-5 bg-slate-300 rounded-full"></div>
            <h2 class="text-base font-extrabold text-slate-800">전체 주제</h2>
            <span class="text-xs text-slate-400 font-medium">내 주제 외 추가 연습</span>
        </div>

        <div th:each="group : ${nonMyTopicGroups}" class="mb-7" th:if="${!group.value.isEmpty()}">
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3" th:text="${group.key}"></p>
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2.5">
                <a th:each="topic : ${group.value}"
                   th:href="@{/practice/combo(topic=${topic.name()},difficulty=${preferredDifficulty.name()})}"
                   th:with="icon=${topicIcons[topic]}"
                   class="topic-card relative bg-white rounded-2xl border border-slate-100 p-3.5 flex flex-col items-center gap-2 shadow-sm text-center cursor-pointer">
                    <div class="w-9 h-9 rounded-xl bg-slate-50 flex items-center justify-center">
                        <i th:class="'fa-solid ' + ${icon != null ? icon : 'fa-circle-question'} + ' text-lg text-slate-400'"></i>
                    </div>
                    <p class="text-xs font-semibold text-slate-500 leading-snug" th:text="${topic.label}"></p>
                </a>
            </div>
        </div>
    </div>

</main>
</div>
</body>
</html>
