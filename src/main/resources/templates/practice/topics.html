<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>주제 탐색 - Opicnic</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex">
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="flex-1 flex flex-col min-w-0">

    <main class="flex-1 p-5 sm:p-6 max-w-4xl mx-auto w-full">

        <!-- 히어로 -->
        <section class="relative overflow-hidden rounded-3xl bg-gradient-to-br from-indigo-600 via-violet-600 to-fuchsia-500 p-6 sm:p-8 text-white shadow-xl mb-5">
            <div class="absolute -right-12 -top-16 h-44 w-44 rounded-full bg-white/10 pointer-events-none"></div>
            <div class="absolute bottom-0 right-20 h-24 w-24 rounded-full bg-white/8 pointer-events-none"></div>

            <div class="relative flex flex-col gap-5 sm:flex-row sm:items-end sm:justify-between">
                <div>
                    <p class="text-xs font-semibold text-indigo-200 uppercase tracking-widest mb-2">OPIc survey topics</p>
                    <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight">주제 탐색</h1>
                    <p class="text-sm text-indigo-100 mt-2">
                        목표 등급 기준 난이도
                        <span class="font-bold text-white" th:text="${preferredDifficulty.label}">난이도</span>로 바로 연습해요.
                        <a href="/mypage" class="ml-1 underline underline-offset-2 text-indigo-200 hover:text-white text-xs transition">변경</a>
                    </p>
                </div>

                <div class="grid grid-cols-2 gap-3 shrink-0">
                    <div class="rounded-2xl bg-white/15 px-4 py-3 backdrop-blur text-center">
                        <p class="text-[11px] text-indigo-200 mb-0.5">전체 주제</p>
                        <p class="text-2xl font-black leading-none"><span th:text="${topicCount}">20</span></p>
                    </div>
                    <div class="rounded-2xl bg-white/20 px-4 py-3 backdrop-blur text-center border border-white/20">
                        <p class="text-[11px] text-indigo-200 mb-0.5">내 주제</p>
                        <p class="text-2xl font-black leading-none" id="myTopicCountHero" th:text="${myTopicCount}">0</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 스티키 내 주제 바 -->
        <div id="stickyBar"
             class="sticky top-0 z-20 -mx-5 sm:-mx-6 px-5 sm:px-6 py-2.5 bg-white/90 backdrop-blur border-b border-slate-100 shadow-sm
                    flex items-center justify-between
                    transition-all duration-200 opacity-0 pointer-events-none">
            <span class="text-sm font-bold text-slate-700">주제 탐색</span>
            <span class="text-sm font-bold text-indigo-600">
                내 주제 <span id="myTopicCountSticky" th:text="${myTopicCount}">0</span>개
            </span>
        </div>

        <!-- 범례 -->
        <div class="flex flex-wrap items-center gap-2 mb-5">
            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 text-[11px] font-semibold bg-yellow-50 text-yellow-700 border border-yellow-200 rounded-full">
                <i class="fa-solid fa-star text-[9px]"></i> 추천
            </span>
            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 text-[11px] font-semibold bg-indigo-50 text-indigo-600 border border-indigo-200 rounded-full">
                <i class="fa-solid fa-check text-[9px]"></i> 내 주제
            </span>
        </div>

        <!-- 주제 그룹 -->
        <div th:each="group : ${topicGroups}" class="mb-8">

            <!-- 카테고리 헤더 -->
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                    <div class="w-1 h-5 bg-indigo-500 rounded-full"></div>
                    <h2 class="text-sm font-extrabold text-slate-800 tracking-tight" th:text="${group.key}"></h2>
                    <span class="text-xs font-medium text-slate-400"
                          th:text="${#lists.size(group.value)} + '개'"></span>
                </div>
            </div>

            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
                <div th:each="topic : ${group.value}"
                     th:with="isRecommended=${recommended.contains(topic)},
                              isMine=${myTopics.contains(topic)},
                              hint=${hints[topic]},
                              icon=${topicIcons[topic]}"
                     class="relative bg-white rounded-2xl border p-4 flex flex-col gap-3 shadow-sm hover:-translate-y-0.5 hover:shadow-md transition-all duration-150"
                     th:classappend="${isMine} ? 'border-indigo-200 bg-indigo-50/60' : 'border-slate-100'">

                    <!-- 아이콘 -->
                    <div class="flex items-center justify-between">
                        <div class="w-9 h-9 rounded-xl flex items-center justify-center"
                             th:classappend="${isMine} ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-100 text-slate-500'">
                            <i th:class="'fa-solid ' + ${icon != null ? icon : 'fa-circle-question'} + ' text-base'"></i>
                        </div>
                        <span th:if="${isRecommended}"
                              class="text-[10px] font-bold bg-yellow-50 text-yellow-600 border border-yellow-200 px-1.5 py-0.5 rounded-full">
                            <i class="fa-solid fa-star text-[8px]"></i>
                        </span>
                        <span th:if="${isMine} and !${isRecommended}"
                              class="text-[10px] font-bold bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded-full">
                            <i class="fa-solid fa-check text-[8px]"></i>
                        </span>
                    </div>

                    <!-- 이름 + 힌트 -->
                    <div class="flex-1">
                        <p class="font-bold text-slate-800 text-sm leading-snug" th:text="${topic.label}"></p>
                        <p th:if="${hint != null}"
                           class="mt-0.5 text-[11px] leading-snug"
                           th:classappend="${isMine} ? 'text-indigo-400' : 'text-slate-400'"
                           th:text="${hint}"></p>
                    </div>

                    <!-- 연습하기 버튼 -->
                    <a th:href="@{/practice/combo(topic=${topic.name()},difficulty=${preferredDifficulty.name()})}"
                       class="mt-auto inline-flex items-center justify-center gap-1.5 rounded-xl py-2 text-xs font-bold transition"
                       th:classappend="${isMine} ? 'bg-indigo-600 text-white hover:bg-indigo-700' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'">
                        연습하기
                        <i class="fa-solid fa-arrow-right text-[10px]"></i>
                    </a>
                </div>
            </div>
        </div>

    </main>
</div>

<script th:inline="javascript">
    const heroCount = document.getElementById('myTopicCountHero');
    const stickyCount = document.getElementById('myTopicCountSticky');
    const stickyBar = document.getElementById('stickyBar');
    const heroSection = document.querySelector('section');

    const observer = new IntersectionObserver(entries => {
        const hidden = !entries[0].isIntersecting;
        stickyBar.classList.toggle('opacity-0', !hidden);
        stickyBar.classList.toggle('pointer-events-none', !hidden);
        stickyBar.classList.toggle('opacity-100', hidden);
        stickyBar.classList.toggle('pointer-events-auto', hidden);
    }, { threshold: 0 });

    observer.observe(heroSection);
</script>
</body>
</html>
