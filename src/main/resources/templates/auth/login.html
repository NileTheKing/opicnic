<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Opicnic - 로그인</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex items-center justify-center p-4">

<div class="w-full max-w-sm">

    <!-- 로고 -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center gap-2.5 mb-4">
            <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center shadow-md shadow-indigo-200">
                <span class="text-white font-bold text-base leading-none">O</span>
            </div>
            <span class="text-2xl font-bold text-indigo-600 tracking-tight">Opicnic</span>
        </div>
        <p class="text-sm text-slate-500">AI 피드백으로 OPIc 목표 등급 달성</p>
    </div>

    <!-- 카드 -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-8">

        <h2 class="text-lg font-bold text-slate-800 mb-1">시작하기</h2>
        <p class="text-sm text-slate-400 mb-6">카카오 계정으로 바로 로그인하세요</p>

        <a href="/oauth2/authorization/kakao"
           class="flex items-center justify-center gap-2.5 w-full bg-[#FEE500] text-[#3C1E1E] font-semibold py-3.5 rounded-xl hover:bg-yellow-300 transition text-sm shadow-sm">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path fill-rule="evenodd" clip-rule="evenodd"
                      d="M9 1C4.582 1 1 3.806 1 7.273c0 2.18 1.418 4.1 3.573 5.236L3.7 15.64a.25.25 0 0 0 .373.277L8.13 13.49c.29.03.583.046.87.046 4.418 0 8-2.806 8-6.273S13.418 1 9 1z"
                      fill="#3C1E1E"/>
            </svg>
            카카오로 로그인
        </a>

        <p class="text-center text-xs text-slate-400 mt-5 leading-relaxed">
            로그인 시 <span class="text-slate-500 font-medium">서비스 이용약관</span> 및
            <span class="text-slate-500 font-medium">개인정보 처리방침</span>에 동의하게 됩니다
        </p>
    </div>

    <!-- 서비스 소개 -->
    <div class="grid grid-cols-3 gap-3 mt-4">
        <div class="bg-white rounded-xl border border-slate-100 p-3 text-center">
            <i class="fa-solid fa-microphone text-indigo-400 text-base mb-1.5 block"></i>
            <p class="text-[11px] font-semibold text-slate-600">음성 제출</p>
            <p class="text-[10px] text-slate-400 mt-0.5">실전 환경 그대로</p>
        </div>
        <div class="bg-white rounded-xl border border-slate-100 p-3 text-center">
            <i class="fa-solid fa-robot text-violet-400 text-base mb-1.5 block"></i>
            <p class="text-[11px] font-semibold text-slate-600">AI 피드백</p>
            <p class="text-[10px] text-slate-400 mt-0.5">항목별 점수 분석</p>
        </div>
        <div class="bg-white rounded-xl border border-slate-100 p-3 text-center">
            <i class="fa-solid fa-chart-line text-emerald-400 text-base mb-1.5 block"></i>
            <p class="text-[11px] font-semibold text-slate-600">약점 파악</p>
            <p class="text-[10px] text-slate-400 mt-0.5">등급 향상 코치</p>
        </div>
    </div>

</div>
</body>
</html>
