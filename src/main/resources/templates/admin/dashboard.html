<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>관리자 대시보드</title>
    <!-- 공통 스타일시트나 스크립트가 있다면 여기에 추가 -->
</head>
<body>
    <!-- 기존의 헤더나 사이드바가 있다면 th:replace를 사용하여 포함 -->
    <div th:replace="~{fragments/header :: header}"></div>
    
    <div class="container">
        <h1>관리자 대시보드</h1>
        <p>이곳에서 질문 세트, 사용자 등 다양한 데이터를 관리할 수 있습니다.</p>
        
        <!-- 향후 구현될 질문 관리 페이지로의 링크 -->
        <div>
            <a href="/admin/question-sets" th:href="@{/admin/question-sets}" class="btn btn-primary">질문 세트 관리하기</a>
        </div>
    </div>

</body>
</html>
