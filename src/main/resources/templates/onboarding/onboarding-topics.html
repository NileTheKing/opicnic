<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주제 선택 - Opicnic</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .topic-label:has(input:checked) {
            border-color: rgb(99 102 241) !important;
            background-color: rgb(99 102 241) !important;
            color: white !important;
        }
        .topic-label:has(input:checked) i { color: white !important; }
        .topic-label:has(input:checked) .check-badge { display: flex !important; }
        .topic-label { transition: all 150ms ease; }
        .topic-label:not(:has(input:checked)):hover {
            border-color: rgb(165 180 252);
            box-shadow: 0 2px 8px 0 rgba(99,102,241,0.10);
            transform: tranbrandY(-1px);
        }
        .tooltip-box {
            pointer-events: none;
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: tranbrandX(-50%);
            width: 9rem;
            z-index: 30;
            opacity: 0;
            transition: opacity 150ms;
            background: #111827;
            color: white;
            font-size: 0.75rem;
            border-radius: 0.75rem;
            padding: 6px 8px;
            text-align: center;
        }
        .tooltip-trigger:hover .tooltip-box,
        .tooltip-trigger.tip-open .tooltip-box { opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-2xl">
    <!-- 스텝 인디케이터 -->
    <div class="flex items-center mb-8 px-4">
        <div class="flex flex-col items-center gap-1">
            <div class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-100 text-gray-500 text-sm font-bold shrink-0">
                <i class="fa-solid fa-check text-xs"></i>
            </div>
            <span class="text-[10px] text-gray-400 font-medium whitespace-nowrap">나의 정보</span>
        </div>
        <div class="flex-1 h-1 mx-3 bg-brand-600 rounded-full mb-4"></div>
        <div class="flex flex-col items-center gap-1">
            <div class="flex items-center justify-center w-8 h-8 rounded-full bg-brand-600 text-white text-sm font-bold shrink-0">2</div>
            <span class="text-[10px] text-brand-600 font-semibold whitespace-nowrap">주제 선택</span>
        </div>
    </div>

    <form th:action="@{/onboarding}" method="post">
        <input type="hidden" name="occupationType" th:value="${occupationType}">
        <input type="hidden" name="residenceType" th:value="${residenceType}">
        <input type="hidden" name="targetGrade" th:value="${targetGrade}">
        <input type="hidden" name="preferredDifficulty" th:value="${preferredDifficulty}">

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <!-- 헤더 + 진행 -->
            <div class="mb-6">
                <div class="flex items-end justify-between mb-3">
                    <div>
                        <h2 class="text-lg font-extrabold text-gray-800">주제 선택</h2>
                        <p class="text-xs text-gray-400 mt-0.5">고득점에 유리한 21개 주제</p>
                    </div>
                    <div class="flex items-end gap-3">
                        <button type="button" id="select-all-btn"
                                class="text-xs font-semibold text-gray-400 hover:text-brand-600 underline underline-offset-2 transition mb-1">
                            전체 선택
                        </button>
                        <div class="text-right">
                            <span id="topicCount" class="text-2xl font-extrabold text-gray-300">0</span>
                            <span class="text-sm text-gray-300 font-medium"> / 12</span>
                        </div>
                    </div>
                </div>
                <div class="w-full bg-gray-100 rounded-full h-2.5">
                    <div id="topic-bar" class="h-2.5 bg-gray-500 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <div id="spare-hint" class="overflow-hidden transition-all duration-500 max-h-0 opacity-0">
                    <p class="flex items-center gap-1.5 mt-2 text-xs text-gray-400 pl-1">
                        <i class="fa-solid fa-check text-green-500 text-[10px]"></i>
                        12개 완료! 마음에 안 드는 게 있다면 1~2개 더 골라두세요. 시험장에서 교체할 수 있어요.
                    </p>
                </div>
            </div>

            <!-- 범례 -->
            <div class="flex items-center gap-4 mb-6 text-[11px] text-gray-400 bg-gray-50 rounded-xl px-3 py-2">
                <span class="font-semibold text-gray-500 shrink-0">준비 부담</span>
                <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-[7px] text-gray-300"></i> 낮음</span>
                <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-[7px] text-gray-300"></i><i class="fa-solid fa-circle text-[7px] text-gray-300 ml-0.5"></i> 보통</span>
                <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-[7px] text-gray-300"></i><i class="fa-solid fa-circle text-[7px] text-gray-300 ml-0.5"></i><i class="fa-solid fa-circle text-[7px] text-gray-300 ml-0.5"></i> 높음</span>
            </div>

            <!-- 카테고리별 카드 -->
            <div th:each="group : ${topicGroups}" class="mb-7" th:attr="data-group=${group.key}">
                <div class="flex items-center gap-2 mb-3">
                    <div class="h-3.5 w-1 bg-brand-400 rounded-full"></div>
                    <h4 class="text-xs font-bold text-gray-600 uppercase tracking-widest" th:text="${group.key}"></h4>
                    <span class="group-progress text-xs font-semibold text-gray-400 ml-auto"></span>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <label th:each="topic : ${group.value}"
                           th:with="hint=${topicHints[topic.name()]}, icon=${topicIcons[topic]}, sets=${topicSetCounts[topic.name()]}"
                           class="topic-label relative flex flex-col items-center gap-2.5 p-5 border-2 border-gray-200 bg-white text-gray-500 rounded-2xl cursor-pointer text-center">
                        <input type="checkbox" name="selectedTopics" th:value="${topic.name()}"
                               class="topic-checkbox sr-only">
                        <span class="check-badge hidden absolute top-2.5 right-2.5 w-5 h-5 bg-white/25 rounded-full items-center justify-center">
                            <i class="fa-solid fa-check text-white text-[9px]"></i>
                        </span>
                        <i th:class="'fa-solid ' + ${icon} + ' text-3xl text-gray-400 topic-icon mt-0.5'"></i>
                        <span class="text-xs font-bold leading-tight" th:text="${topic.label}"></span>
                        <!-- 세트 수 도트 -->
                        <div class="tooltip-trigger relative flex gap-1 items-center cursor-pointer" onclick="toggleTip(event, this)">
                            <i class="fa-solid fa-circle text-[7px] text-gray-300 set-dot"></i>
                            <i th:if="${sets >= 2}" class="fa-solid fa-circle text-[7px] text-gray-300 set-dot"></i>
                            <i th:if="${sets >= 3}" class="fa-solid fa-circle text-[7px] text-gray-300 set-dot"></i>
                            <i th:if="${sets >= 4}" class="fa-solid fa-circle text-[7px] text-gray-300 set-dot"></i>
                            <div class="tooltip-box">
                                <span th:text="${sets} + '세트 · 준비 부담 ' + (${sets} == 1 ? '낮음' : (${sets} == 2 ? '보통' : '높음'))"></span>
                                <div style="position:absolute;top:100%;left:50%;transform:tranbrandX(-50%);border:4px solid transparent;border-top-color:#111827"></div>
                            </div>
                        </div>
                    </label>
                </div>
            </div>

            <p class="text-[11px] text-gray-300 mb-6 pl-1">* 실제 시험엔 더 많은 주제가 있어요. 고득점에 유리한 것만 추렸어요.</p>

            <div class="flex gap-3">
                <button type="button" onclick="history.back()"
                        class="px-5 py-4 border-2 border-gray-200 text-gray-400 rounded-2xl font-semibold hover:border-gray-300 hover:text-gray-500 transition-all active:scale-95">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <button type="submit" id="submit-btn" disabled
                        class="flex-1 py-4 rounded-2xl font-bold text-base flex items-center justify-center gap-2 transition-all bg-gray-100 text-gray-400 cursor-not-allowed">
                    <i class="fa-solid fa-rocket"></i> 연습 시작하기
                </button>
            </div>
        </div>
    </form>

    <p class="text-center text-xs text-gray-400 mt-4">나중에 마이페이지에서 언제든 변경할 수 있어요.</p>
</div>

<script>
    const countEl  = document.getElementById('topicCount');
    const barEl    = document.getElementById('topic-bar');
    const spareEl  = document.getElementById('spare-hint');
    const submitBtn = document.getElementById('submit-btn');
    const GROUP_MIN = { '여가 활동': 2, '취미 / 관심사': 1, '운동': 1, '여행 / 휴가': 1 };
    let prevCount = 0;

    function isFormValid() {
        const total = document.querySelectorAll('.topic-checkbox:checked').length;
        if (total < 12) return false;
        return [...document.querySelectorAll('[data-group]')].every(groupEl => {
            const min = GROUP_MIN[groupEl.dataset.group];
            return !min || groupEl.querySelectorAll('.topic-checkbox:checked').length >= min;
        });
    }

    function updateSubmitBtn() {
        const valid = isFormValid();
        submitBtn.disabled = !valid;
        if (valid) {
            submitBtn.className = 'flex-1 py-4 rounded-2xl font-bold text-base flex items-center justify-center gap-2 transition-all bg-brand-600 text-white hover:bg-brand-700 active:scale-[0.98] shadow-lg shadow-brand-200 cursor-pointer';
        } else {
            submitBtn.className = 'flex-1 py-4 rounded-2xl font-bold text-base flex items-center justify-center gap-2 transition-all bg-gray-100 text-gray-400 cursor-not-allowed';
        }
    }

    function applyTopicStyle(label, checked) {
        const icon = label.querySelector('.topic-icon');
        const dots = label.querySelectorAll('.set-dot');
        if (checked) {
            label.classList.add('border-brand-500', 'bg-gray-500', 'text-white');
            label.classList.remove('border-gray-200', 'bg-white', 'text-gray-500', 'hover:border-brand-300');
            if (icon) { icon.classList.remove('text-gray-400'); icon.classList.add('text-white'); }
            dots.forEach(d => { d.classList.remove('text-gray-300'); d.classList.add('text-white'); });
        } else {
            label.classList.remove('border-brand-500', 'bg-gray-500', 'text-white');
            label.classList.add('border-gray-200', 'bg-white', 'text-gray-500', 'hover:border-brand-300');
            if (icon) { icon.classList.remove('text-white'); icon.classList.add('text-gray-400'); }
            dots.forEach(d => { d.classList.remove('text-white'); d.classList.add('text-gray-300'); });
        }
    }

    function updateCount() {
        const count = document.querySelectorAll('.topic-checkbox:checked').length;
        barEl.style.width = Math.min(count / 12 * 100, 100) + '%';
        if (count >= 12) {
            countEl.textContent = count;
            countEl.className = 'text-2xl font-extrabold text-green-500';
            barEl.className = 'h-2.5 bg-green-500 rounded-full transition-all duration-300';
            if (prevCount < 12) {
                countEl.animate([{transform:'scale(1)'},{transform:'scale(1.25)'},{transform:'scale(1)'}], {duration:300, easing:'ease-out'});
                spareEl.classList.remove('max-h-0', 'opacity-0');
                spareEl.classList.add('max-h-20', 'opacity-100');
            }
        } else {
            countEl.textContent = count;
            countEl.className = 'text-2xl font-extrabold ' + (count === 0 ? 'text-gray-300' : 'text-gray-500');
            barEl.className = 'h-2.5 bg-gray-500 rounded-full transition-all duration-300';
            spareEl.classList.add('max-h-0', 'opacity-0');
            spareEl.classList.remove('max-h-20', 'opacity-100');
        }
        prevCount = count;
    }

    function updateGroupProgress(groupEl) {
        if (!groupEl) return;
        const min = GROUP_MIN[groupEl.dataset.group];
        if (!min) return;
        const checked = groupEl.querySelectorAll('.topic-checkbox:checked').length;
        const el = groupEl.querySelector('.group-progress');
        if (!el) return;
        el.textContent = checked >= min ? '✓' : checked + '/' + min + ' 필수';
        el.className = 'group-progress text-xs ' + (checked >= min ? 'font-bold text-green-500' : 'text-gray-400');
    }

    document.querySelectorAll('.topic-checkbox').forEach(cb => {
        cb.addEventListener('change', function () {
            applyTopicStyle(this.closest('label'), this.checked);
            updateCount();
            updateGroupProgress(this.closest('[data-group]'));
            updateSubmitBtn();
        });
    });

    // 툴팁 tap 토글
    function toggleTip(e, el) {
        e.stopPropagation();
        const isOpen = el.classList.contains('tip-open');
        document.querySelectorAll('.tooltip-trigger.tip-open').forEach(t => t.classList.remove('tip-open'));
        if (!isOpen) el.classList.add('tip-open');
    }
    document.addEventListener('click', () => {
        document.querySelectorAll('.tooltip-trigger.tip-open').forEach(t => t.classList.remove('tip-open'));
    });

    document.getElementById('select-all-btn').addEventListener('click', function () {
        document.querySelectorAll('.topic-checkbox').forEach(cb => {
            cb.checked = true;
            applyTopicStyle(cb.closest('label'), true);
        });
        document.querySelectorAll('[data-group]').forEach(updateGroupProgress);
        updateCount();
        updateSubmitBtn();
    });

    document.querySelectorAll('[data-group]').forEach(updateGroupProgress);
    updateCount();
    updateSubmitBtn();
</script>
</body>
</html>
