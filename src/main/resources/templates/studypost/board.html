<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스터디 모집</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://use.fontawesome.com/releases/v6.4.0/js/all.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        'primary-dark': '#4338CA',
                        secondary: '#8B5CF6',
                        accent: '#F59E0B'
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif']
                    },
                    boxShadow: {
                        card: '0 4px 12px rgba(0, 0, 0, 0.05)'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css">
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #F7F9FC;
        }
        .line-clamp-2 {
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .btn-radio.active, .btn-checkbox.active {
            background-color: #4F46E5;
            color: white;
        }
        .btn-radio, .btn-checkbox {
            transition: all 0.3s ease;
            border: 1px solid #E5E7EB;
        }
        .btn-radio:hover, .btn-checkbox:hover {
            background-color: #EEF2FF;
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-recruiting {
            background-color: #DCFCE7;
            color: #166534;
        }
        .status-completed {
            background-color: #FEF3C7;
            color: #92400E;
        }
    </style>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>

<!-- Hero Section -->
<div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <h1 class="text-3xl font-bold mb-4">함께 성장하는 스터디 커뮤니티</h1>
        <p class="text-lg opacity-90 max-w-2xl">스터디 그룹을 찾고, 나에게 맞는 사람들과 함께 공부해보세요!</p>
    </div>
</div>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- 필터링 섹션 -->
    <div class="bg-white rounded-xl shadow-card p-6 mb-8 -mt-8 relative z-10">
        <form id="filterForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- 지역 선택 -->
                <div class="space-y-3">
                    <label class="block text-sm font-medium text-gray-700">지역 선택</label>
                    <div id="region-options" class="grid grid-cols-2 gap-3"></div>
                </div>

                <!-- 스터디 종류 -->
                <div class="space-y-3">
                    <label class="block text-sm font-medium text-gray-700">스터디 종류</label>
                    <div id="studytype-options" class="flex flex-wrap gap-2"></div>
                </div>

                <!-- 모집 상태 -->
                <div class="space-y-3">
                    <label class="block text-sm font-medium text-gray-700">모집 상태</label>
                    <div class="flex gap-2">
                        <button type="button" data-value="" class="btn-radio active px-4 py-2 rounded-full text-sm">전체</button>
                        <button type="button" data-value="RECRUITING" class="btn-radio px-4 py-2 rounded-full text-sm">모집중</button>
                        <button type="button" data-value="COMPLETED" class="btn-radio px-4 py-2 rounded-full text-sm">모집완료</button>
                    </div>
                </div>
            </div>
            <div class="flex justify-end pt-4">
                <button type="submit" class="px-6 py-2 text-sm font-medium text-white bg-primary hover:bg-primary-dark rounded-full shadow-md hover:shadow-lg transition">
                    <i class="fas fa-search mr-2"></i> 검색하기
                </button>
            </div>
        </form>
    </div>

    <div class="flex flex-col sm:flex-row justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-900 mb-4 sm:mb-0">스터디 목록</h2>
        <a href="/studypost/new" class="inline-flex items-center px-5 py-2.5 text-sm font-medium text-white bg-primary hover:bg-primary-dark rounded-full shadow-md hover:shadow-lg transition">
            <i class="fas fa-plus mr-2"></i> 새 스터디 모집하기
        </a>
    </div>

    <div id="study-post-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
        <!-- 게시글 카드 삽입 영역 -->
    </div>

    <!-- 페이지네이션 추가 -->
    <div class="flex justify-center mt-8">
        <nav class="inline-flex rounded-md shadow-sm">
            <a href="#" class="px-3 py-2 rounded-l-md bg-white border border-gray-300 text-gray-500 hover:bg-gray-50">이전</a>
            <a href="#" class="px-3 py-2 bg-primary border border-primary text-white">1</a>
            <a href="#" class="px-3 py-2 bg-white border border-gray-300 text-gray-500 hover:bg-gray-50">2</a>
            <a href="#" class="px-3 py-2 bg-white border border-gray-300 text-gray-500 hover:bg-gray-50">3</a>
            <a href="#" class="px-3 py-2 rounded-r-md bg-white border border-gray-300 text-gray-500 hover:bg-gray-50">다음</a>
        </nav>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        await loadEnumOptions();
        fetchStudyPosts();

        document.getElementById('filterForm').addEventListener('submit', function (e) {
            e.preventDefault();
            fetchStudyPosts();
        });

        // ✅ 체크박스(지역) 변경 감지
        document.getElementById('filterForm').addEventListener('change', function (e) {
            if (e.target.name === 'regions') {
                fetchStudyPosts();
            }
        });
    });

    async function loadEnumOptions() {
        const [regionRes, typeRes] = await Promise.all([
            fetch('/api/enums/regions'),
            fetch('/api/enums/study-types')
        ]);
        const regions = await regionRes.json();
        const types = await typeRes.json();

        const regionBox = document.getElementById('region-options');
        regions.forEach(r => {
            regionBox.insertAdjacentHTML('beforeend', `
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" name="regions" value="${r.code}" class="w-4 h-4 text-primary rounded focus:ring-primary">
                    <span>${r.label}</span>
                </label>
            `);
        });

        const typeBox = document.getElementById('studytype-options');
        types.forEach(t => {
            typeBox.insertAdjacentHTML('beforeend', `
                <button type="button" data-value="${t.code}" class="btn-checkbox px-4 py-2 rounded-full text-sm">${t.label}</button>
            `);
        });

        document.querySelectorAll('.btn-checkbox').forEach(btn => {
            btn.addEventListener('click', () => {
                btn.classList.toggle('active');
                fetchStudyPosts();  // ✅ 즉시 반영
            });
        });

        document.querySelectorAll('.btn-radio').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.btn-radio').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                fetchStudyPosts();  // ✅ 즉시 반영
            });
        });
    }

    async function fetchStudyPosts() {
        const form = document.getElementById('filterForm');
        const formData = new FormData(form);
        const params = new URLSearchParams();

        formData.getAll('regions').forEach(v => params.append('regions', v));
        const types = Array.from(document.querySelectorAll('.btn-checkbox.active')).map(b => b.dataset.value);
        types.forEach(t => params.append('studyTypes', t));
        const status = document.querySelector('.btn-radio.active')?.dataset.value;
        if (status) params.append('status', status);

        try {
            const res = await fetch(`/api/study-posts?${params.toString()}`);
            const posts = await res.json();

            const container = document.getElementById('study-post-list');
            container.innerHTML = '';

            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="col-span-1 md:col-span-3 py-12 flex flex-col items-center justify-center text-gray-500">
                        <i class="fas fa-search text-4xl mb-4"></i>
                        <p>검색 결과가 없습니다</p>
                        <p class="text-sm mt-2">다른 검색 조건으로 다시 시도해보세요</p>
                    </div>
                `;
                return;
            }

            posts.forEach(post => {
                const statusClass = post.status === 'RECRUITING' ? 'status-recruiting' : 'status-completed';
                const statusText = post.status === 'RECRUITING' ? '모집중' : '모집완료';

                const card = `
                    <div class="bg-white rounded-xl shadow-card overflow-hidden card-hover">
                        <a href="/studypost/${post.id}" class="block">
                            <div class="h-48 bg-gray-200 overflow-hidden relative">
                                <img src="${post.thumbnailUrl || 'https://via.placeholder.com/400x200'}" class="w-full h-full object-cover">
                                <div class="absolute top-3 right-3">
                                    <span class="status-badge ${statusClass}">${statusText}</span>
                                </div>
                            </div>
                            <div class="p-5">
                                <h3 class="text-lg font-semibold text-gray-900 line-clamp-2">${post.title}</h3>
                                <div class="flex flex-wrap gap-1 mt-3">
                                    ${post.regions.map(region => `
                                        <span class="px-2 py-1 bg-indigo-50 text-indigo-800 text-xs rounded-md">${region}</span>
                                    `).join('')}
                                </div>
                                <div class="mt-3 flex justify-between items-center">
                                    <span class="text-sm text-gray-600">${post.studyType}</span>
                                    <span class="text-xs text-gray-500">${formatDate(post.createdAt)}</span>
                                </div>
                            </div>
                        </a>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', card);
            });
        } catch (error) {
            console.error('Error fetching study posts:', error);
        }
    }

    // 날짜 포맷팅 함수 (예시)
    function formatDate(dateString) {
        if (!dateString) return '';
        const date = new Date(dateString);
        return `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}`;
    }
</script>
</body>
</html>
