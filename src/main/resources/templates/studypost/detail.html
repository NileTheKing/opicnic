<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스터디 게시글 상세 (JSON API)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://use.fontawesome.com/releases/v6.4.0/js/all.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        'primary-dark': '#4338CA',
                        secondary: '#8B5CF6',
                        accent: '#F59E0B'
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif']
                    },
                    boxShadow: {
                        card: '0 4px 12px rgba(0, 0, 0, 0.05)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #F7F9FC;
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 500;
        }
        .status-recruiting {
            background-color: #DCFCE7;
            color: #166534;
        }
        .status-completed {
            background-color: #FEF3C7;
            color: #92400E;
        }
        .content-area {
            min-height: 200px;
        }
        .btn {
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .post-meta-item {
            display: inline-flex;
            align-items: center;
            margin-right: 1rem;
            color: #4B5563;
        }
        .post-meta-item i {
            color: #6366F1;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>

<header id="header-container"></header>

<div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-8">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center space-x-2 mb-2">
            <a href="/board" class="text-white/80 hover:text-white">
                <i class="fas fa-home"></i>
            </a>
            <span class="text-white/60">
                <i class="fas fa-chevron-right text-xs"></i>
            </span>
            <a href="/studypost" class="text-white/80 hover:text-white">스터디 목록</a>
            <span class="text-white/60">
                <i class="fas fa-chevron-right text-xs"></i>
            </span>
            <span class="text-white/90">스터디 상세</span>
        </div>
        <h1 id="post-title" class="text-2xl md:text-3xl font-bold"></h1>
    </div>
</div>

<main class="max-w-4xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
    <div class="bg-white shadow-card rounded-xl p-6 md:p-8 -mt-10 relative z-10">
        <div class="flex flex-wrap items-center mb-6 pb-6 border-b border-gray-100">
            <div class="w-full md:w-3/4 space-y-3 mb-4 md:mb-0">
                <div class="flex flex-wrap items-center gap-y-2">
                    <span id="post-writer" class="post-meta-item">
                        <i class="far fa-user"></i>
                        <span></span>
                    </span>
                    <span id="post-studyType" class="post-meta-item">
                        <i class="fas fa-bookmark"></i>
                        <span></span>
                    </span>
                    <span id="post-regions" class="post-meta-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span></span>
                    </span>
                    <span id="post-participants" class="post-meta-item">
                        <i class="fas fa-users"></i>
                        <span></span>
                    </span>
                </div>
                <div class="text-sm text-gray-500">
                    <span id="post-date" class="mr-4">
                        <i class="far fa-calendar-alt mr-1"></i>
                        <span></span>
                    </span>
                    <span id="post-views">
                        <i class="far fa-eye mr-1"></i>
                        <span>조회 </span>
                    </span>
                </div>
            </div>
            <div class="w-full md:w-1/4 flex justify-start md:justify-end">
                <span id="post-status" class="status-badge inline-block"></span>
            </div>
        </div>

        <div id="post-content" class="content-area text-gray-700 leading-relaxed whitespace-pre-wrap mb-8">
        </div>

        <div class="mt-8 pt-6 border-t border-gray-100">
            <div class="flex flex-wrap gap-2 mb-4" id="post-tags">
            </div>

            <div class="bg-indigo-50 rounded-lg p-4 mt-6">
                <h3 class="text-lg font-semibold text-indigo-800 mb-3">
                    <i class="fas fa-info-circle mr-2"></i>모집 정보
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex items-center">
                        <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center mr-3">
                            <i class="fas fa-users text-indigo-600"></i>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">모집 인원</p>
                            <p id="detail-participants" class="font-medium"></p>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center mr-3">
                            <i class="fas fa-map-marker-alt text-indigo-600"></i>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">지역</p>
                            <p id="detail-regions" class="font-medium"></p>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center mr-3">
                            <i class="fas fa-bookmark text-indigo-600"></i>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">스터디 유형</p>
                            <p id="detail-studyType" class="font-medium"></p>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center mr-3">
                            <i class="fas fa-calendar-check text-indigo-600"></i>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">상태</p>
                            <p id="detail-status" class="font-medium"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-8 flex justify-between items-center">
        <a href="/studypost" class="btn inline-flex items-center px-4 py-2 bg-gray-100 text-gray-700 text-sm font-medium rounded-full hover:bg-gray-200 shadow-sm">
            <i class="fas fa-arrow-left mr-2"></i> 목록으로
        </a>
        <div class="space-x-2">
            <button id="btn-share" class="btn inline-flex items-center px-4 py-2 bg-gray-100 text-gray-700 text-sm font-medium rounded-full hover:bg-gray-200 shadow-sm">
                <i class="fas fa-share-alt mr-2"></i> 공유하기
            </button>
            <button id="btn-edit" class="btn inline-flex items-center px-4 py-2 bg-yellow-500 text-white text-sm font-medium rounded-full hover:bg-yellow-600 shadow-md">
                <i class="fas fa-edit mr-2"></i> 수정
            </button>
            <a id="btn-apply" href="#" class="btn inline-flex items-center px-5 py-2 bg-primary text-white text-sm font-medium rounded-full hover:bg-primary-dark shadow-md">
                <i class="fas fa-user-plus mr-2"></i> 참여신청
            </a>

            <button id="btn-delete" class="btn inline-flex items-center px-4 py-2 bg-red-500 text-white text-sm font-medium rounded-full hover:bg-red-600 shadow-md">
                <i class="fas fa-trash-can mr-2"></i> 삭제
            </button>
        </div>
    </div>

    <!-- ✅ 신청자 목록 섹션 -->
    <div class="mt-12">
        <h2 class="text-xl font-bold mb-4">신청자 목록</h2>
        <div id="application-section" class="bg-white shadow rounded-lg p-4">
            <p id="no-applicants" class="text-gray-500 text-sm">아직 신청한 사람이 없습니다.</p>
            <ul id="applicant-list" class="divide-y divide-gray-200">
                <!-- 신청자 항목이 여기에 렌더링됨 -->
            </ul>
        </div>
    </div>

    <div class="mt-12">
        <h2 class="text-xl font-bold mb-4">관련 스터디</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="related-studies">
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const postId = window.location.pathname.split('/').pop();
            if (!postId) {
                alert("게시글 ID가 없습니다.");
                window.location.href = '/board';
                return;
            }

            try {
                const response = await fetch(`/api/study-posts/${postId}`);
                if (!response.ok) throw new Error("게시글 불러오기 실패");

                const data = await response.json();
                console.log("받은 데이터:", data);

                // 헤더 프래그먼트 로드 (기존 방식 유지 가정)
                const headerResponse = await fetch('/fragments/header');
                if (headerResponse.ok) {
                    const headerHtml = await headerResponse.text();
                    document.getElementById('header-container').innerHTML = headerHtml;
                }

                // 게시글 정보 표시
                document.getElementById('post-title').textContent = data.title;
                document.getElementById('post-content').textContent = data.content;
                document.getElementById('post-studyType').lastElementChild.textContent = data.studyType;
                document.getElementById('post-writer').lastElementChild.textContent = data.writerName || '익명';
                document.getElementById('post-regions').lastElementChild.textContent = data.regions ? data.regions.join(', ') : '';
                document.getElementById('post-participants').lastElementChild.textContent = `${data.currentParticipants || 0}/${data.maxParticipants}명`;

                // 세부 정보 영역
                document.getElementById('detail-participants').textContent = `${data.currentParticipants || 0}/${data.maxParticipants}명`;
                document.getElementById('detail-regions').textContent = data.regions ? data.regions.join(', ') : '';
                document.getElementById('detail-studyType').textContent = data.studyType;

                // 날짜 포맷팅
                if (data.createdAt) {
                    const date = new Date(data.createdAt);
                    const formattedDate = `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}`;
                    document.getElementById('post-date').lastElementChild.textContent = formattedDate;
                }

                // 조회수
                if (data.viewCount !== undefined) {
                    document.getElementById('post-views').lastElementChild.textContent = `조회 ${data.viewCount}`;
                }

                // 태그
                const tagsContainer = document.getElementById('post-tags');
                tagsContainer.innerHTML = '';
                if (data.tags && data.tags.length > 0) {
                    data.tags.forEach(tag => {
                        tagsContainer.insertAdjacentHTML('beforeend', `
                            <span class="px-3 py-1 bg-indigo-50 text-indigo-700 text-sm rounded-full">#${tag}</span>
                        `);
                    });
                }

                // 상태 표시
                const statusEl = document.getElementById('post-status');
                const detailStatusEl = document.getElementById('detail-status');
                const isRecruiting = data.status === 'RECRUITING';
                statusEl.textContent = isRecruiting ? '모집중' : '모집완료';
                statusEl.className = `status-badge ${isRecruiting ? 'status-recruiting' : 'status-completed'}`;
                detailStatusEl.textContent = isRecruiting ? '모집중' : '모집완료';

                // 버튼 상태 설정
                const applyBtn = document.getElementById('btn-apply');
                if (!isRecruiting) {
                    applyBtn.classList.remove('bg-primary', 'hover:bg-primary-dark');
                    applyBtn.classList.add('bg-gray-400', 'cursor-not-allowed');
                    applyBtn.onclick = (e) => e.preventDefault();
                    applyBtn.innerHTML = '<i class="fas fa-lock mr-2"></i> 모집 마감';
                } else {
                    applyBtn.href = `/api/study-posts/${postId}/apply`;
                }

                // 공유 버튼 기능 (유지)
                document.getElementById('btn-share').addEventListener('click', () => {
                    const url = window.location.href;
                    navigator.clipboard.writeText(url).then(() => {
                        alert('링크가 클립보드에 복사되었습니다.');
                    }).catch(err => {
                        console.error('복사 실패:', err);
                    });
                });

                const editBtn = document.getElementById('btn-edit');
                if (editBtn) {
                    editBtn.addEventListener('click', () => {
                        window.location.href = `/studypost/edit-post/${postId}`;
                    });
                }
                const deleteBtn = document.getElementById('btn-delete');
                if (deleteBtn) {
                    deleteBtn.addEventListener('click', async () => {
                        if (confirm("정말로 삭제하시겠습니까?")) {
                            try {
                                const deleteResponse = await fetch(`/api/study-posts/${postId}`, {
                                    method: 'DELETE'
                                });
                                if (!deleteResponse.ok) throw new Error("게시글 삭제 실패");
                                alert("게시글이 삭제되었습니다.");
                                window.location.href = '/board';
                            } catch (error) {
                                console.error('삭제 실패:', error);
                                alert("게시글 삭제에 실패했습니다.");
                            }
                        }
                    });
                }

                // 관련 스터디 로드 (API 호출 방식으로 변경)
                await loadApplications(postId);
                loadRelatedStudies(data.studyType);


            } catch (err) {
                console.error(err);
                document.getElementById('post-content').textContent = "게시글을 불러오는 중 오류가 발생했습니다.";
                alert("게시글을 불러오는 중 오류가 발생했습니다.");
            }
        });
        // ✅ 신청자 목록 로드 함수
        async function loadApplications(postId) {
            try {
                const res = await fetch(`/api/study-posts/${postId}/applications`);
                const applications = await res.json();
                const list = document.getElementById('applicant-list');
                const noApplicants = document.getElementById('no-applicants');

                list.innerHTML = '';
                if (!applications.length) {
                    noApplicants.style.display = 'block';
                    return;
                }
                noApplicants.style.display = 'none';

                applications.forEach(app => {
                    const li = document.createElement('li');
                    li.className = 'py-2 flex justify-between items-center';
                    li.innerHTML = `
                    <span class="font-medium text-gray-700">${app.applicantNickname}</span>
                    <span class="text-xs px-2 py-1 rounded-full ${app.status === 'PENDING' ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-700'}">
                        ${app.status === 'PENDING' ? '대기중' : app.status}
                    </span>
                `;
                    list.appendChild(li);
                });
            } catch (e) {
                console.error('신청자 목록 로딩 실패:', e);
            }
        }

        async function loadRelatedStudies(studyType) {
            try {
                const response = await fetch(`/api/study-posts/related?type=${encodeURIComponent(studyType)}&limit=3`);
                if (!response.ok) return;

                const studies = await response.json();
                const container = document.getElementById('related-studies');
                container.innerHTML = '';

                studies.forEach(study => {
                    container.insertAdjacentHTML('beforeend', `
                        <div class="bg-white shadow-card rounded-xl overflow-hidden">
                            <div class="h-32 bg-gray-200">
                                <img src="${study.thumbnailUrl || 'https://via.placeholder.com/300x150'}" alt="${study.title}" class="w-full h-full object-cover">
                            </div>
                            <div class="p-4">
                                <h3 class="font-medium text-gray-900">${study.title}</h3>
                                <p class="text-sm text-gray-500 mt-1">${study.regions && study.regions.length > 0 ? study.regions[0] : '지역 미정'} · ${study.maxParticipants}명 모집</p>
                            </div>
                        </div>
                    `);
                });
            } catch (error) {
                console.error('관련 스터디 로드 실패:', error);
            }
        }
    </script>
</body>
</html>
