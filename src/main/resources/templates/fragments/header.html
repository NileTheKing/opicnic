<!-- fragments/header.html -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Header Fragment</title>
</head>
<body>
<!-- 프래그먼트 시작 -->
<header th:fragment="header" class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center">
                <a href="/" class="flex items-center">
                    <span style="font-family: 'Pacifico', cursive;" class="text-xl text-blue-600">Opicnic</span>
                </a>
            </div>

            <div sec:authorize="!isAuthenticated()" class="flex items-center space-x-2 sm:space-x-4">
                <a href="/auth/login"
                   class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium transition-colors">로그인</a>
                <a href="/members/new"
                   class="bg-blue-600 text-white hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium transition-colors shadow-sm">회원가입</a>
            </div>

            <div sec:authorize="isAuthenticated()" class="flex items-center space-x-2 sm:space-x-4">
                <div class="relative">
                    <button id="notification-btn"
                            class="w-10 h-10 flex items-center justify-center text-gray-600 hover:text-blue-600 rounded-full hover:bg-gray-100 relative transition-colors">
                        <i class="fas fa-bell"></i>
                        <span th:if="${notificationCount > 0}" class="absolute top-0 right-0 w-4 h-4 bg-red-500 rounded-full text-xs text-white flex items-center justify-center transform -translate-y-1/3 translate-x-1/3" th:text="${notificationCount}">3</span>
                    </button>

                    <div id="notification-dropdown" class="hidden opacity-0 absolute right-0 mt-2 w-72 bg-white rounded-md shadow-lg overflow-hidden z-20 border border-gray-200">
                        <div class="px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                            <h3 class="font-semibold text-gray-800">알림</h3>
                            <span th:if="${notificationCount > 0}" class="bg-blue-100 text-blue-600 text-xs px-2 py-1 rounded-full font-medium" th:text="${notificationCount} + '개 새 알림'">3개 새 알림</span>
                        </div>
                        <div class="max-h-72 overflow-y-auto">
                            <div th:if="${notifications != null && !notifications.isEmpty()}">
                                <div th:each="notification : ${notifications}" class="px-4 py-3 border-b border-gray-100 hover:bg-gray-50">
                                    <div class="flex items-start">
                                        <div class="flex-shrink-0 w-2 h-2 mt-2 bg-blue-500 rounded-full" th:if="${!notification.read}"></div>
                                        <div class="ml-3">
                                            <p class="text-sm text-gray-800" th:text="${notification.message}">새로운 메시지가 도착했습니다.</p>
                                            <p class="text-xs text-gray-500 mt-1" th:text="${notification.createdAt}">방금 전</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div th:if="${notifications == null || notifications.isEmpty()}" class="px-4 py-3 text-sm text-gray-600 text-center">
                                새 알림이 없습니다.
                            </div>
                        </div>
                        <div class="px-4 py-2 border-t border-gray-100 text-center">
                            <a href="/notifications" class="text-sm text-blue-600 hover:underline font-medium">모든 알림 보기</a>
                        </div>
                    </div>
                </div>

                <div class="relative">
                    <button id="profile-btn"
                            class="flex items-center space-x-2 text-gray-700 hover:text-blue-600 px-3 py-2 rounded-md transition-colors">
                        <div class="w-8 h-8 rounded-full overflow-hidden bg-gray-200 border-2 border-white shadow-sm">
                            <img th:if="${#authentication != null && #authentication.principal != null && #authentication.principal.attributes != null && #authentication.principal.attributes['kakao_account'] != null && #authentication.principal.attributes['kakao_account']['profile'] != null && #authentication.principal.attributes['kakao_account']['profile']['profile_image_url'] != null}"
                                 th:src="${#authentication.principal.attributes['kakao_account']['profile']['profile_image_url']}"
                                 alt="profile"
                                 class="w-full h-full object-cover">
                            <div th:unless="${#authentication != null && #authentication.principal != null && #authentication.principal.attributes != null && #authentication.principal.attributes['kakao_account'] != null && #authentication.principal.attributes['kakao_account']['profile'] != null && #authentication.principal.attributes['kakao_account']['profile']['profile_image_url'] != null}"
                                 class="w-full h-full flex items-center justify-center bg-blue-600 text-white">
                                <span th:if="${#authentication != null && #authentication.principal != null && #authentication.principal.attributes != null && #authentication.principal.attributes['kakao_account'] != null && #authentication.principal.attributes['kakao_account']['profile'] != null && #authentication.principal.attributes['kakao_account']['profile']['nickname'] != null}"
                                      th:text="${#authentication.principal.attributes['kakao_account']['profile']['nickname'].substring(0,1)}">U</span>
                                <span th:unless="${#authentication != null && #authentication.principal != null && #authentication.principal.attributes != null && #authentication.principal.attributes['kakao_account'] != null && #authentication.principal.attributes['kakao_account']['profile'] != null && #authentication.principal.attributes['kakao_account']['profile']['nickname'] != null}">U</span>
                            </div>
                        </div>
                        <span class="text-sm font-medium hidden sm:block"
                              th:if="${#authentication != null && #authentication.principal != null && #authentication.principal.attributes != null && #authentication.principal.attributes['kakao_account'] != null && #authentication.principal.attributes['kakao_account']['profile'] != null && #authentication.principal.attributes['kakao_account']['profile']['nickname'] != null}"
                              th:text="${#authentication.principal.attributes['kakao_account']['profile']['nickname']}">사용자</span>
                        <span class="text-sm font-medium hidden sm:block"
                              th:unless="${#authentication != null && #authentication.principal != null && #authentication.principal.attributes != null && #authentication.principal.attributes['kakao_account'] != null && #authentication.principal.attributes['kakao_account']['profile'] != null && #authentication.principal.attributes['kakao_account']['profile']['nickname'] != null}">사용자</span>
                        <i class="fas fa-chevron-down text-xs"></i>
                    </button>

                    <div id="profile-dropdown" class="hidden opacity-0 absolute right-0 mt-2 w-56 bg-white rounded-md shadow-lg overflow-hidden z-20 border border-gray-200">
                        <div class="px-4 py-3 border-b border-gray-100">
                            <p class="text-sm font-medium text-gray-800"
                               th:if="${#authentication != null && #authentication.principal != null && #authentication.principal.attributes != null && #authentication.principal.attributes['kakao_account'] != null && #authentication.principal.attributes['kakao_account']['profile'] != null && #authentication.principal.attributes['kakao_account']['profile']['nickname'] != null}"
                               th:text="${#authentication.principal.attributes['kakao_account']['profile']['nickname']}">사용자</p>
                            <p class="text-sm font-medium text-gray-800"
                               th:unless="${#authentication != null && #authentication.principal != null && #authentication.principal.attributes != null && #authentication.principal.attributes['kakao_account'] != null && #authentication.principal.attributes['kakao_account']['profile'] != null && #authentication.principal.attributes['kakao_account']['profile']['nickname'] != null}">사용자</p>
                            <p class="text-xs text-gray-500 mt-1"
                               th:if="${#authentication != null && #authentication.principal != null && #authentication.principal.attributes != null && #authentication.principal.attributes['kakao_account'] != null && #authentication.principal.attributes['kakao_account']['email'] != null}"
                               th:text="${#authentication.principal.attributes['kakao_account']['email']}">user@example.com</p>
                        </div>
                        <a href="/mypage"
                           class="block px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 flex items-center">
                            <i class="fas fa-user w-5 h-5 mr-3 text-gray-500"></i> 마이페이지
                        </a>
                        <a href="/settings"
                           class="block px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 flex items-center">
                            <i class="fas fa-cog w-5 h-5 mr-3 text-gray-500"></i> 설정
                        </a>
                        <div class="border-t border-gray-100 my-1"></div>
                        <a href="/auth/logout"
                           class="block px-4 py-3 text-sm text-red-600 hover:bg-red-50 flex items-center">
                            <i class="fas fa-sign-out-alt w-5 h-5 mr-3 text-red-500"></i> 로그아웃
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 헤더에 직접 스크립트 포함 -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 드롭다운 요소 선택
            const notificationBtn = document.getElementById('notification-btn');
            const notificationDropdown = document.getElementById('notification-dropdown');
            const profileBtn = document.getElementById('profile-btn');
            const profileDropdown = document.getElementById('profile-dropdown');

            // 초기 상태 설정 - 클래스만 변경하고 display는 JS로 처리
            if (notificationDropdown) notificationDropdown.classList.add('hidden');
            if (profileDropdown) profileDropdown.classList.add('hidden');

            // 토글 함수
            function toggleDropdown(button, dropdown) {
                if (!button || !dropdown) return;

                button.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();

                    const isVisible = !dropdown.classList.contains('hidden');

                    // 모든 드롭다운 닫기
                    if (notificationDropdown) {
                        notificationDropdown.classList.add('hidden');
                        notificationDropdown.classList.remove('block');
                        notificationDropdown.style.opacity = '0';
                    }

                    if (profileDropdown) {
                        profileDropdown.classList.add('hidden');
                        profileDropdown.classList.remove('block');
                        profileDropdown.style.opacity = '0';
                    }

                    // 클릭한 드롭다운이 숨겨져 있었다면 표시
                    if (!isVisible) {
                        dropdown.classList.remove('hidden');
                        dropdown.classList.add('block');
                        setTimeout(() => {
                            dropdown.style.opacity = '1';
                        }, 10);
                    }
                });
            }

            // 드롭다운 이벤트 연결
            toggleDropdown(notificationBtn, notificationDropdown);
            toggleDropdown(profileBtn, profileDropdown);

            // 바깥 클릭시 드롭다운 닫기
            document.addEventListener('click', function(e) {
                if (notificationDropdown && !notificationBtn.contains(e.target)) {
                    notificationDropdown.classList.add('hidden');
                    notificationDropdown.classList.remove('block');
                    notificationDropdown.style.opacity = '0';
                }

                if (profileDropdown && !profileBtn.contains(e.target)) {
                    profileDropdown.classList.add('hidden');
                    profileDropdown.classList.remove('block');
                    profileDropdown.style.opacity = '0';
                }
            });

            // ESC 키 누를 때 드롭다운 닫기
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (notificationDropdown) {
                        notificationDropdown.classList.add('hidden');
                        notificationDropdown.classList.remove('block');
                        notificationDropdown.style.opacity = '0';
                    }

                    if (profileDropdown) {
                        profileDropdown.classList.add('hidden');
                        profileDropdown.classList.remove('block');
                        profileDropdown.style.opacity = '0';
                    }
                }
            });
        });
    </script>

    <!-- 스타일 추가 -->
    <style>
        #notification-dropdown, #profile-dropdown {
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform: translateY(10px);
        }

        #notification-dropdown.block, #profile-dropdown.block {
            transform: translateY(0);
        }
    </style>
</header>
<!-- 프래그먼트 끝 -->
</body>
</html>
